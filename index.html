<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <title>Super Racer 7.0 - POLICE CHASE</title>
    <style>
        :root { --road: #333; --grass: #2d5a27; --line: #fff; }
        body { margin: 0; background: #1a1a1a; display: flex; justify-content: center; align-items: center; height: 100vh; color: white; font-family: sans-serif; overflow: hidden; }
        
        #game-container { position: relative; width: 400px; height: 750px; background: var(--road); border-left: 20px solid var(--grass); border-right: 20px solid var(--grass); overflow: hidden; display: none; }
        .lane-line { position: absolute; left: 50%; width: 6px; height: 80px; background: var(--line); transform: translateX(-50%); animation: moveRoad 0.6s linear infinite; }
        @keyframes moveRoad { 0% { top: -100px; } 100% { top: 750px; } }

        /* Banor */
        .desert { --grass: #edc9af !important; --road: #d2b48c !important; }
        .neon { --grass: #000 !important; --road: #111 !important; --line: #0ff !important; box-shadow: 0 0 50px #0ff; }

        .car-sprite { position: absolute; width: 50px; height: 90px; z-index: 10; background-size: contain; background-repeat: no-repeat; }
        .police { animation: siren 0.2s infinite alternate; border-radius: 5px; }
        @keyframes siren { 0% { box-shadow: 0 0 20px blue; } 100% { box-shadow: 0 0 20px red; } }

        /* Trafikljus */
        #traffic-light { position: absolute; right: 30px; top: -300px; width: 40px; height: 100px; background: #222; border-radius: 5px; z-index: 60; display: flex; flex-direction: column; align-items: center; justify-content: space-around; padding: 5px 0; border: 2px solid #555; transition: top 0.5s; }
        .light { width: 25px; height: 25px; border-radius: 50%; background: #444; }
        .red { background: #ff0000 !important; box-shadow: 0 0 15px red; }
        .yellow { background: #ffaa00 !important; box-shadow: 0 0 15px orange; }
        .green { background: #00ff00 !important; box-shadow: 0 0 15px green; }
        #stop-line { position: absolute; width: 100%; height: 8px; background: rgba(255,255,255,0.4); top: -150px; }

        .overlay { position: absolute; width: 400px; height: 750px; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; text-align: center; }
        .btn { padding: 20px; width: 250px; margin: 10px; cursor: pointer; background: #e74c3c; color: white; border: none; border-radius: 10px; font-weight: bold; font-size: 18px; }
        .btn:hover { background: #c0392b; transform: scale(1.05); }
        
        #hud { position: absolute; top: 20px; left: 20px; z-index: 50; background: rgba(0,0,0,0.8); padding: 15px; border-radius: 10px; border: 1px solid #444; font-family: monospace; }
    </style>
</head>
<body>

    <div id="menu" class="overlay">
        <h1 style="color:#e74c3c; font-size: 40px; margin-bottom: 5px;">SUPER RACER 7.0</h1>
        <div style="color:#f1c40f; margin-bottom: 20px;">
            💰 CASH: <span id="m-cash">0</span> kr | 🛣️ KM: <span id="m-dist">0</span>
        </div>
        <button class="btn" onclick="startGame()">STARTA SPELET</button>
        <p style="color:#888;">Undvik polisen & trafikljusen!</p>
    </div>

    <div id="game-over" class="overlay" style="display:none;">
        <h1 style="color:#e74c3c">BUSTED / CRASHED</h1>
        <p id="stats-final"></p>
        <button class="btn" onclick="startGame()">FÖRSÖK IGEN</button>
        <button class="btn" style="background:#555" onclick="location.reload()">GARAGE</button>
    </div>

    <div id="hud">
        🏁 DISTANS: <span id="h-dist">0</span>m<br>
        💰 CASH: <span id="h-cash">0</span>kr<br>
        🚦 LJUS: <span id="h-light" style="font-weight:bold">KÖR</span>
    </div>

    <div id="game-container">
        <div id="traffic-light">
            <div id="light-r" class="light"></div>
            <div id="light-y" class="light"></div>
            <div id="light-g" class="light"></div>
        </div>
        <div id="stop-line"></div>
        <div class="lane-line" style="top:0"></div>
        <div class="lane-line" style="top:250px"></div>
        <div class="lane-line" style="top:500px"></div>
        <div id="player" class="car-sprite"></div>
    </div>

    <script>
        const carSVG = "url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI1MCIgaGVpZ2h0PSI5MCI+PHJlY3QgeD0iNSIgeT0iNSIgd2lkdGg9IjQwIiBoZWlnaHQ9IjgwIiByeD0iMTAiIGZpbGw9IiMzNDk4ZGIiLz48L3N2Zz4=')";
        const policeSVG = "url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI1MCIgaGVpZ2h0PSI5MCI+PHJlY3QgeD0iNSIgeT0iNSIgd2lkdGg9IjQwIiBoZWlnaHQ9IjgwIiByeD0iMTAiIGZpbGw9IiMwMDAiLz48cmVjdCB4PSIxMCIgeT0iNSIgd2lkdGg9IjMwIiBoZWlnaHQ9IjUiIGZpbGw9ImJsdWUiLz48L3N2Zz4=')";

        let cash = parseInt(localStorage.getItem('carCash')) || 0;
        let totalDist = parseInt(localStorage.getItem('carDist')) || 0;
        let gameActive = false;
        let score = 0;
        let playerX = 175;
        let nitro = false;
        let currentLight = 'green';

        document.getElementById('m-cash').innerText = cash;
        document.getElementById('m-dist').innerText = (totalDist/1000).toFixed(1);

        function startGame() {
            gameActive = true; score = 0; playerX = 175;
            document.getElementById('menu').style.display = 'none';
            document.getElementById('game-over').style.display = 'none';
            document.getElementById('game-container').style.display = 'block';
            
            const p = document.getElementById('player');
            p.style.backgroundImage = carSVG;
            p.style.left = playerX + 'px';
            p.style.bottom = "30px";

            // Bana baserat på distans
            const gc = document.getElementById('game-container');
            gc.className = '';
            if(totalDist > 5000) gc.classList.add('neon');
            else if(totalDist > 2000) gc.classList.add('desert');

            document.querySelectorAll('.enemy, .police').forEach(e => e.remove());
            
            spawnTraffic();
            lightLogic();
        }

        function spawnTraffic() {
            if(!gameActive) return;
            createCar(false);
            if(Math.random() > 0.8) createCar(true); // 20% chans för polis
            setTimeout(spawnTraffic, 1500 - Math.min(score, 1000));
        }

        function createCar(isPolice) {
            const c = document.createElement('div');
            c.className = isPolice ? 'car-sprite police' : 'car-sprite enemy';
            c.style.backgroundImage = isPolice ? policeSVG : carSVG;
            if(!isPolice) c.style.filter = `hue-rotate(${Math.random()*360}deg)`;
            
            c.style.left = Math.random() * 320 + 20 + 'px';
            c.style.top = '-100px';
            c.style.transform = 'rotate(180deg)';
            document.getElementById('game-container').appendChild(c);

            let y = -100;
            let move = setInterval(() => {
                if(!gameActive) { clearInterval(move); c.remove(); return; }
                
                let speed = (isPolice ? 12 : 7) + (score/500);
                if(nitro) speed += 5;
                y += speed;
                c.style.top = y + 'px';

                // Kollision
                let pr = document.getElementById('player').getBoundingClientRect();
                let cr = c.getBoundingClientRect();
                if(!(pr.top > cr.bottom || pr.bottom < cr.top || pr.left > cr.right || pr.right < cr.left)) {
                    gameOver(isPolice);
                }

                if(y > 800) { 
                    clearInterval(move); c.remove(); 
                    score += 100; 
                    document.getElementById('h-dist').innerText = score;
                }
            }, 20);
        }

        function lightLogic() {
            if(!gameActive) return;
            const tl = document.getElementById('traffic-light');
            const line = document.getElementById('stop-line');
            
            setTimeout(() => {
                if(!gameActive) return;
                tl.style.top = "100px";
                line.style.top = "200px";
                
                setLight('green');
                setTimeout(() => setLight('yellow'), 3000);
                setTimeout(() => setLight('red'), 5000);
                
                setTimeout(() => {
                    tl.style.top = "-300px";
                    line.style.top = "-150px";
                    setLight('green');
                    lightLogic();
                }, 8000);
            }, 10000);
        }

        function setLight(color) {
            currentLight = color;
            document.getElementById('light-r').className = 'light' + (color==='red'?' red':'');
            document.getElementById('light-y').className = 'light' + (color==='yellow'?' yellow':'');
            document.getElementById('light-g').className = 'light' + (color==='green'?' green':'');
            document.getElementById('h-light').innerText = color === 'red' ? 'STOPP!' : 'KÖR';
            document.getElementById('h-light').style.color = color;
        }

        function gameOver(byPolice) {
            gameActive = false;
            let fine = byPolice ? 1000 : 0;
            let earned = Math.floor(score / 10) - fine;
            cash += Math.max(0, earned);
            totalDist += score;
            
            localStorage.setItem('carCash', cash);
            localStorage.setItem('carDist', totalDist);

            document.getElementById('game-over').style.display = 'flex';
            document.getElementById('stats-final').innerText = byPolice ? 
                `POLISEN TOG DIG! Böter: 1000kr. Du körde ${score}m.` : 
                `Du krockade! Du körde ${score}m och tjänade ${earned}kr.`;
        }

        document.addEventListener('keydown', (e) => {
            if(!gameActive) return;
            if(e.key === 'ArrowLeft' && playerX > 30) playerX -= 60;
            if(e.key === 'ArrowRight' && playerX < 310) playerX += 60;
            if(e.code === 'Space') nitro = true;
            document.getElementById('player').style.left = playerX + 'px';
            
            // Kolla rödlykte-förseelse
            if(currentLight === 'red' && score > 0) {
                // Om man rör sig under rött ljus kan man trigga en extra polis
                if(Math.random() > 0.5) createCar(true);
            }
        });
        document.addEventListener('keyup', (e) => { if(e.code === 'Space') nitro = false; });
    </script>
</body>
</html>
