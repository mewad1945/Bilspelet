<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <title>Mewad Racing - Neon Night</title>
    <style>
        :root { --p: #00ff41; --s: #ff0055; --blue: #00d4ff; --bg: #050505; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; display: flex; }
        
        /* --- SPELYTA --- */
        #game-container { position: relative; width: 400px; height: 100vh; background: #111; overflow: hidden; border-left: 4px solid #333; border-right: 4px solid #333; }
        .road-line { position: absolute; width: 6px; height: 50px; background: rgba(255,255,255,0.3); left: 50%; transform: translateX(-50%); }
        
        #player { position: absolute; width: 40px; height: 70px; z-index: 10; transition: transform 0.1s; filter: drop-shadow(0 0 10px var(--blue)); font-size: 40px; display: flex; align-items: center; justify-content: center; }
        .enemy { position: absolute; width: 40px; height: 70px; font-size: 40px; display: flex; align-items: center; justify-content: center; }
        .oil { position: absolute; width: 50px; height: 50px; background: rgba(0,0,0,0.8); border-radius: 50%; filter: blur(5px); }
        .boost { position: absolute; width: 30px; height: 30px; font-size: 25px; animation: pulse 1s infinite; }
        
        /* --- UI & SIDEBAR --- */
        #ui { flex: 1; padding: 20px; display: flex; flex-direction: column; background: #0a0a0a; }
        .stat-box { font-size: 24px; font-weight: bold; margin-bottom: 10px; color: var(--p); }
        #garage { background: #161616; padding: 15px; border-radius: 10px; margin-top: 20px; border: 1px solid var(--blue); }
        .car-opt { font-size: 30px; cursor: pointer; padding: 10px; border: 1px solid #333; margin: 5px; display: inline-block; border-radius: 5px; }
        .car-opt:hover { background: #222; }

        #leaderboard { margin-top: auto; padding: 10px; background: #000; border-top: 2px solid var(--s); font-size: 14px; }
        #chat { height: 150px; background: #111; border: 1px solid #333; margin-top: 10px; overflow-y: auto; padding: 5px; font-size: 12px; }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.2); } 100% { transform: scale(1); } }
        .flash-red { animation: redAlert 0.5s infinite; }
        @keyframes redAlert { 0% { background: #111; } 50% { background: #400; } 100% { background: #111; } }
    </style>
</head>
<body>

<div id="game-container">
    <div id="player">🏎️</div>
</div>

<div id="ui">
    <div class="stat-box">DISTANS: <span id="dist">0</span> km</div>
    <div class="stat-box" style="color:var(--s)">FART: <span id="speed">0</span> km/h</div>
    
    <div id="garage">
        <b>GARAGE (Välj bil):</b><br>
        <span class="car-opt" onclick="changeCar('🏎️')">🏎️</span>
        <span class="car-opt" onclick="changeCar('🚗')">🚗</span>
        <span class="car-opt" onclick="changeCar('🚓')">🚓</span>
        <span class="car-opt" onclick="changeCar('🚚')">🚚</span>
    </div>

    <div id="chat"><b>System:</b> Välkommen till Mewad Racing!<br></div>
    <input type="text" id="chat-in" placeholder="Chatta..." style="background:#111; border:1px solid #333; color:white; padding:5px;">

    <div id="leaderboard">
        <b>🏆 TOP DRIVERS:</b>
        <div id="lb-list"></div>
    </div>
</div>

<script>
    const container = document.getElementById('game-container');
    const player = document.getElementById('player');
    const distEl = document.getElementById('dist');
    const speedEl = document.getElementById('speed');
    
    let gameActive = true;
    let distance = 0;
    let speed = 5;
    let playerX = 180;
    let laneWidth = 400;
    let oilEffect = 0;
    let playerName = localStorage.getItem('shawarma_name_fixed') || "Racer";

    // --- SPEL-OBJEKT ---
    let enemies = [];
    let obstacles = [];
    let lines = [];

    // Skapa väglinjer
    for(let i=0; i<10; i++) {
        let line = document.createElement('div');
        line.className = 'road-line';
        line.style.top = (i * 100) + 'px';
        container.appendChild(line);
        lines.push(line);
    }

    // --- STYRNING ---
    window.onkeydown = (e) => {
        if(!gameActive) return;
        let move = 20 + oilEffect;
        if(e.key === "ArrowLeft" && playerX > 20) playerX -= move;
        if(e.key === "ArrowRight" && playerX < 340) playerX += move;
        player.style.left = playerX + "px";
    };

    function changeCar(emoji) { player.innerText = emoji; }

    // --- LOGIK ---
    function spawnEnemy() {
        if(!gameActive) return;
        let e = document.createElement('div');
        e.className = 'enemy';
        let isPolice = Math.random() > 0.8;
        e.innerText = isPolice ? "🚓" : "🚘";
        e.style.left = Math.floor(Math.random() * 340) + "px";
        e.style.top = "-100px";
        container.appendChild(e);
        enemies.push({el: e, y: -100, speed: speed + (isPolice ? 2 : 0)});
    }

    function spawnObstacle() {
        let type = Math.random();
        let o = document.createElement('div');
        if(type > 0.5) {
            o.className = 'oil';
            o.dataset.type = "oil";
        } else {
            o.className = 'boost';
            o.innerText = "⚡";
            o.dataset.type = "boost";
        }
        o.style.left = Math.floor(Math.random() * 340) + "px";
        o.style.top = "-100px";
        container.appendChild(o);
        obstacles.push({el: o, y: -100});
    }

    // --- RÖTT LJUD & VARNING (Var 30:e sek) ---
    setInterval(() => {
        if(!gameActive) return;
        container.classList.add('flash-red');
        let audio = new Audio('https://soundjay.com');
        audio.play();
        setTimeout(() => container.classList.remove('flash-red'), 3000);
    }, 30000);

    // --- GAME LOOP ---
    function update() {
        if(!gameActive) return;

        distance += speed / 100;
        distEl.innerText = Math.floor(distance);
        speedEl.innerText = Math.floor(speed * 20);

        // Öka svårighetsgrad var 100km
        if(Math.floor(distance) % 100 === 0 && distance > 1) {
            speed += 0.001; 
            container.style.background = `hsl(${distance}, 20%, 10%)`; // Ny "bana" färg
        }

        // Flytta linjer
        lines.forEach(l => {
            let top = parseFloat(l.style.top) + speed;
            if(top > window.innerHeight) top = -100;
            l.style.top = top + "px";
        });

        // Hantera fiender
        enemies.forEach((en, i) => {
            en.y += en.speed;
            en.el.style.top = en.y + "px";
            
            // Kollision
            let rect1 = player.getBoundingClientRect();
            let rect2 = en.el.getBoundingClientRect();
            if(!(rect1.right < rect2.left || rect1.left > rect2.right || rect1.bottom < rect2.top || rect1.top > rect2.bottom)) {
                gameOver();
            }

            if(en.y > window.innerHeight) {
                en.el.remove();
                enemies.splice(i, 1);
            }
        });

        // Hantera objekt (Olja/Boost)
        obstacles.forEach((ob, i) => {
            ob.y += speed;
            ob.el.style.top = ob.y + "px";

            let rect1 = player.getBoundingClientRect();
            let rect2 = ob.el.getBoundingClientRect();
            if(!(rect1.right < rect2.left || rect1.left > rect2.right || rect1.bottom < rect2.top || rect1.top > rect2.bottom)) {
                if(ob.el.dataset.type === "oil") {
                    oilEffect = 30 * (Math.random() > 0.5 ? 1 : -1);
                    setTimeout(() => oilEffect = 0, 2000);
                } else {
                    speed += 2;
                    setTimeout(() => speed -= 2, 3000);
                }
                ob.el.remove();
                obstacles.splice(i, 1);
            }
        });

        requestAnimationFrame(update);
    }

    function gameOver() {
        gameActive = false;
        alert("CRASH! Din distans: " + Math.floor(distance) + " km");
        saveScore();
        location.reload();
    }

    function saveScore() {
        let lb = JSON.parse(localStorage.getItem('racing_lb') || "[]");
        lb.push({n: playerName, d: Math.floor(distance)});
        lb.sort((a,b) => b.d - a.d);
        localStorage.setItem('racing_lb', JSON.stringify(lb.slice(0,5)));
    }

    function updateLB() {
        let lb = JSON.parse(localStorage.getItem('racing_lb') || "[]");
        document.getElementById('lb-list').innerHTML = lb.map(x => `<div>${x.n}: ${x.d}km</div>`).join('');
    }

    setInterval(spawnEnemy, 1500);
    setInterval(spawnObstacle, 4000);
    
    update();
    updateLB();
    handlePlayerName(); // Använd samma namn som i Shawarma Simulator
</script>
</body>
</html>
