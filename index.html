<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nitro Rush - Top Down Racing</title>
    <style>
        body { margin: 0; padding: 0; background-color: #333; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; }
        
        #main-menu { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(45deg, #1a1a1a, #4a4a4a); color: white; text-align: center; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; }
        #main-menu h1 { font-size: 60px; margin-bottom: 20px; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        .menu-btn { padding: 15px 40px; font-size: 22px; margin: 10px; cursor: pointer; background-color: #e74c3c; color: white; border: none; border-radius: 5px; transition: transform 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .menu-btn:hover { transform: scale(1.1); background-color: #c0392b; }
        .menu-btn:disabled { background-color: #7f8c8d; cursor: not-allowed; transform: none; }
        
        #game-area { width: 400px; height: 100vh; position: relative; margin: 0 auto; background-color: #555; overflow: hidden; border-left: 10px solid gold; border-right: 10px solid gold; box-sizing: border-box; }
        
        /* Road Lanes */
        .road { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .lane-markings { position: absolute; width: 10px; height: 80px; background-color: white; left: calc(50% - 5px); }

        /* The Player Car */
        #player-car { width: 50px; height: 90px; position: absolute; border: 2px solid white; border-radius: 5px; box-shadow: 0 4px 8px rgba(0,0,0,0.5); z-index: 50; }
        /* Alternative Player Car Image */
        /* #player-car { background-image: url('images/player-car.png'); background-size: cover; background-position: center; border: none; } */

        /* Traffic Cars */
        .obstacle-car { width: 50px; height: 90px; position: absolute; z-index: 40; border-radius: 5px; box-shadow: 0 4px 8px rgba(0,0,0,0.5); border: 2px solid #ccc; }
        /* Alternative Obstacle Car Image */
        /* .obstacle-car { background-image: url('images/obstacle-car.png'); background-size: cover; background-position: center; border: none; } */

        /* Police Cars */
        .police-car { width: 50px; height: 90px; position: absolute; background-color: red; border: 4px solid blue; animation: flash-police 0.5s infinite; border-radius: 5px; box-shadow: 0 4px 8px rgba(0,0,0,0.5); z-index: 60; }
        /* Alternative Police Car Image */
        /* .police-car { background-image: url('images/police-car.png'); background-size: cover; background-position: center; border: 4px solid transparent; animation: flash-police 0.5s infinite; } */
        @keyframes flash-police { 0% { border-color: red; } 50% { border-color: blue; } 100% { border-color: red; } }

        /* UI Elements */
        #score-display { position: fixed; top: 20px; left: 20px; color: white; font-size: 24px; font-weight: bold; }
        #nitro-display { position: fixed; top: 60px; left: 20px; color: gold; font-size: 20px; font-weight: bold; text-shadow: 0 0 5px gold; opacity: 0.2; }
        #nitro-display.ready { opacity: 1; animation: pulse-nitro 1s infinite; }
        #nitro-bar-container { width: 200px; height: 10px; background-color: #333; margin-top: 10px; border: 2px solid #ccc; }
        #nitro-bar { height: 100%; width: 0%; background-color: gold; transition: width 0.1s linear; }
        @keyframes pulse-nitro { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        #money-display { position: fixed; top: 120px; left: 20px; color: lightgreen; font-size: 24px; font-weight: bold; text-shadow: 1px 1px 2px black; }

        /* General UI for Game Over/Level Up */
        #message-display { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; color: white; display: none; z-index: 100; font-size: 30px; font-weight: bold; }
        #restart-btn { margin-top: 20px; }

        /* Traffic Light */
        #traffic-light-container { position: fixed; top: 20px; right: 20px; width: 50px; height: 130px; background-color: #333; border: 4px solid #1a1a1a; display: none; flex-direction: column; justify-content: space-around; align-items: center; padding: 10px; z-index: 90; }
        .light { width: 30px; height: 30px; border-radius: 50%; background-color: #555; }
        .light.green { background-color: #2ecc71; box-shadow: 0 0 10px #2ecc71; }
        .light.yellow { background-color: #f1c40f; box-shadow: 0 0 10px #f1c40f; }
        .light.red { background-color: #e74c3c; box-shadow: 0 0 10px #e74c3c; }

    </style>
</head>
<body>

    <div id="main-menu">
        <h1>NITRO RUSH</h1>
        <p>Distans sammanlagt: <span id="total-dist-display">0</span> km</p>
        <p>Pengar: <span id="money-menu-display">0</span> kr</p>
        <button id="start-btn" class="menu-btn">STARTA RACE</button>
        <button id="garage-btn" class="menu-btn">GARAGE</button>
        <button id="tracks-btn" class="menu-btn">BYT BANA</button>
    </div>

    <div id="garage-menu" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); color: white; text-align: center; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 101;">
        <h2>GARAGE</h2>
        <p>Dina pengar: <span id="garage-money">0</span> kr</p>
        <div id="car-list" style="display: flex; gap: 20px; margin: 20px;">
            </div>
        <button id="back-from-garage" class="menu-btn">TILLBAKA</button>
    </div>

    <div id="tracks-menu" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); color: white; text-align: center; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 101;">
        <h2>VÄLJ BANA</h2>
        <p>Totalt körd sträcka: <span id="tracks-total-dist">0</span> km</p>
        <div style="display: flex; flex-direction: column; gap: 10px;">
            <button class="track-btn menu-btn" data-track="standard" data-req="0">Standard (0 km)</button>
            <button class="track-btn menu-btn" data-track="öken" data-req="1000" disabled>Öken (1000 km sammanlagt)</button>
            <button class="track-btn menu-btn" data-track="natt" data-req="5000" disabled>Natt (5000 km sammanlagt)</button>
            <button class="track-btn menu-btn" data-track="neon" data-req="10000" disabled>NeonCity (10000 km sammanlagt)</button>
        </div>
        <button id="back-from-tracks" class="menu-btn" style="margin-top: 20px;">TILLBAKA</button>
    </div>

    <div id="game-area" style="display: none;">
        <div id="road">
            <div id="lane-markings"></div>
        </div>
        <div id="player-car"></div>
    </div>

    <div id="score-display">Distans: 0m</div>
    <div id="nitro-display">
        NITRO: <span id="nitro-status">Redo! (Tryck N)</span>
        <div id="nitro-bar-container"><div id="nitro-bar"></div></div>
    </div>
    <div id="money-display">Pengar: 0 kr</div>

    <div id="message-display">
        GAME OVER!<br>
        Du körde <span id="end-score">0</span> meter och tjänade <span id="end-money">0</span> kr.
        <br>
        <button id="restart-btn" class="menu-btn">Spela Igen</button>
        <button id="menu-btn-end" class="menu-btn">Huvudmeny</button>
    </div>

    <div id="traffic-light-container">
        <div id="light-green" class="light green"></div>
        <div id="light-yellow" class="light yellow"></div>
        <div id="light-red" class="light red"></div>
    </div>

    <script>
        // CONFIGURATION
        const ROAD_WIDTH = 400;
        const CAR_WIDTH = 50;
        const CAR_HEIGHT = 90;
        const GAME_SPEED_BASE = 8;
        const NITRO_SPEED_MULTIPLIER = 1.8;
        const LANE_MARKING_SPEED = 1.2;
        const MIN_CAR_SPAWN_INTERVAL = 1500;
        const MAX_CAR_SPAWN_INTERVAL = 4000;
        const NITRO_RECHARGE_TIME = 10000; // 10 seconds
        const NITRO_DURATION = 4000; // 4 seconds
        const TRAFFIC_LIGHT_MIN_INTERVAL = 20000; // 20s
        const TRAFFIC_LIGHT_MAX_INTERVAL = 40000; // 40s
        const MONEY_PER_CAR = 10;

        // Variables
        let player = {
            element: document.getElementById('player-car'),
            x: (ROAD_WIDTH / 2) - (CAR_WIDTH / 2),
            y: 0,
            speed: 0,
            originalSpeed: 0,
            nitroActive: false,
            nitroReady: true,
            distance: 0,
            money: 0,
            activeCarIndex: 0
        };

        // Persistent data
        let totalDistance = localStorage.getItem('totalDistance') ? parseInt(localStorage.getItem('totalDistance')) : 0;
        let persistentMoney = localStorage.getItem('persistentMoney') ? parseInt(localStorage.getItem('persistentMoney')) : 0;
        let ownedCars = localStorage.getItem('ownedCars') ? JSON.parse(localStorage.getItem('ownedCars')) : [0];
        player.activeCarIndex = localStorage.getItem('activeCarIndex') ? parseInt(localStorage.getItem('activeCarIndex')) : 0;
        player.money = persistentMoney;

        // Car Shop Database
        const CAR_DB = [
            { name: "Rookie", cost: 0, speed: 0.10, color: "blue", img: "" },
            { name: "Sportster", cost: 200, speed: 0.12, color: "lime", img: "" },
            { name: "TurboX", cost: 500, speed: 0.14, color: "cyan", img: "" },
            { name: "Formula-X", cost: 1000, speed: 0.16, color: "yellow", img: "" }
        ];

        // Track Database
        const TRACK_DB = {
            standard: { bgColor: "#555", borderColor: "gold", name: "Standard" },
            öken: { bgColor: "#edc9af", borderColor: "#f4a460", name: "Öken" },
            natt: { bgColor: "#222", borderColor: "#555", name: "Natt" },
            neon: { bgColor: "#111", borderColor: "#ff00ff", name: "NeonCity" }
        };

        let currentTrack = localStorage.getItem('currentTrack') ? localStorage.getItem('currentTrack') : "standard";

        // DOM elements
        let gameArea = document.getElementById('game-area');
        let road = document.getElementById('road');
        let laneMarkings = document.getElementById('lane-markings');
        let scoreDisplay = document.getElementById('score-display');
        let nitroStatusDisplay = document.getElementById('nitro-status');
        let nitroBar = document.getElementById('nitro-bar');
        let moneyDisplay = document.getElementById('money-display');
        let messageDisplay = document.getElementById('message-display');
        let trafficLightContainer = document.getElementById('traffic-light-container');

        // States
        let isGameRunning = false;
        let keys = {};
        let obstacles = [];
        let laneMarkingsList = [];
        let gameLoopId;
        let carSpawnTimer;
        let nitroRechargeTimer;
        let trafficLightSequenceTimer;
        let policeSequenceTimer;
        let policeCars = [];
        let startTime;

        // --- Functions ---

        function init() {
            // Setup keys
            window.addEventListener('keydown', e => keys[e.code] = true);
            window.addEventListener('keyup', e => keys[e.code] = false);
            window.addEventListener('keydown', e => { if (e.code === 'KeyN') tryActivateNitro(); });

            // Set background track
            applyTrack(currentTrack);

            // Menu Buttons
            document.getElementById('start-btn').addEventListener('click', startGame);
            document.getElementById('garage-btn').addEventListener('click', showGarage);
            document.getElementById('tracks-btn').addEventListener('click', showTracks);
            document.getElementById('restart-btn').addEventListener('click', startGame);
            document.getElementById('menu-btn-end').addEventListener('click', showMainMenu);
            document.getElementById('back-from-garage').addEventListener('click', backFromGarage);
            document.getElementById('back-from-tracks').addEventListener('click', backFromTracks);

            updateMenuDisplays();
        }

        function updateMenuDisplays() {
            document.getElementById('total-dist-display').innerText = totalDistance;
            document.getElementById('money-menu-display').innerText = persistentMoney;
            document.getElementById('garage-money').innerText = persistentMoney;
            document.getElementById('tracks-total-dist').innerText = totalDistance;
        }

        function applyTrack(trackKey) {
            const track = TRACK_DB[trackKey];
            gameArea.style.backgroundColor = track.bgColor;
            gameArea.style.borderColor = track.borderColor;
            currentTrack = trackKey;
            localStorage.setItem('currentTrack', currentTrack);
        }

        function createLaneMarkings() {
            const numMarkings = Math.ceil(gameArea.offsetHeight / 160) + 1;
            for (let i = 0; i < numMarkings; i++) {
                const marking = document.createElement('div');
                marking.className = 'lane-markings';
                marking.style.top = (i * 160) + 'px';
                laneMarkings.appendChild(marking);
                laneMarkingsList.push({ element: marking, y: i * 160 });
            }
        }

        function getLanes() {
            const lane1X = (ROAD_WIDTH / 4) - (CAR_WIDTH / 2);
            const lane2X = (ROAD_WIDTH * 0.75) - (CAR_WIDTH / 2);
            return [lane1X, lane2X];
        }

        function createObstacleCar() {
            const obstacle = document.createElement('div');
            obstacle.className = 'obstacle-car';
            const lanes = getLanes();
            const randomLane = lanes[Math.floor(Math.random() * lanes.length)];
            const randomColor = `hsl(${Math.random() * 360}, 60%, 60%)`;

            obstacle.style.left = randomLane + 'px';
            obstacle.style.top = '-' + CAR_HEIGHT + 'px';
            obstacle.style.backgroundColor = randomColor; // Set color (for models without image)

            road.appendChild(obstacle);
            obstacles.push({ element: obstacle, x: randomLane, y: -CAR_HEIGHT, passed: false });
        }

        function createPoliceCar(laneIdx) {
            const police = document.createElement('div');
            police.className = 'police-car';
            const lanes = getLanes();
            const spawnX = lanes[laneIdx];
            police.style.left = spawnX + 'px';
            police.style.top = gameArea.offsetHeight + 'px'; // Start from bottom
            road.appendChild(police);
            policeCars.push({ element: police, x: spawnX, y: gameArea.offsetHeight });
        }

        function startGame() {
            if (isGameRunning) return;

            // Reset game state
            player.x = (ROAD_WIDTH / 2) - (CAR_WIDTH / 2);
            player.distance = 0;
            player.money = 0;
            player.nitroReady = true;
            player.nitroActive = false;
            player.originalSpeed = GAME_SPEED_BASE + CAR_DB[player.activeCarIndex].speed * GAME_SPEED_BASE;
            player.speed = player.originalSpeed;

            ownedCars.sort((a,b) => a-b);
            player.element.style.backgroundColor = CAR_DB[player.activeCarIndex].color;

            obstacles.forEach(ob => ob.element.remove());
            obstacles = [];
            policeCars.forEach(pc => pc.element.remove());
            policeCars = [];
            
            clearInterval(gameLoopId);
            clearTimeout(carSpawnTimer);
            clearTimeout(nitroRechargeTimer);
            clearTimeout(trafficLightSequenceTimer);
            clearTimeout(policeSequenceTimer);

            // Clear and recreate lane markings
            laneMarkings.innerHTML = '';
            laneMarkingsList = [];
            createLaneMarkings();

            // Setup UI
            messageDisplay.style.display = 'none';
            trafficLightContainer.style.display = 'none';
            document.getElementById('main-menu').style.display = 'none';
            gameArea.style.display = 'block';
            updateInGameUI();

            isGameRunning = true;
            startTime = Date.now();
            gameLoop();
            spawnObstacles();
            scheduleTrafficLight();
        }

        function gameLoop() {
            if (!isGameRunning) return;

            // Player movement
            if (keys['ArrowLeft'] || keys['KeyA']) player.x -= 7;
            if (keys['ArrowRight'] || keys['KeyD']) player.x += 7;

            // Boundary checks
            if (player.x < 0) player.x = 0;
            if (player.x > ROAD_WIDTH - CAR_WIDTH) player.x = ROAD_WIDTH - CAR_WIDTH;

            player.element.style.left = player.x + 'px';
            player.element.style.bottom = '20px';

            // Background / Lane markings movement
            laneMarkingsList.forEach(marking => {
                marking.y += player.speed * LANE_MARKING_SPEED;
                if (marking.y >= gameArea.offsetHeight) {
                    marking.y -= gameArea.offsetHeight + 160;
                }
                marking.element.style.top = marking.y + 'px';
            });

            // Obstacles movement and scoring
            for (let i = obstacles.length - 1; i >= 0; i--) {
                obstacles[i].y += player.speed * 0.8;
                obstacles[i].element.style.top = obstacles[i].y + 'px';

                // Check collision (AABB)
                if (isColliding(player, obstacles[i])) {
                    endGame();
                    return;
                }

                // Check if passed for money
                if (!obstacles[i].passed && obstacles[i].y > gameArea.offsetHeight - (CAR_HEIGHT / 2)) {
                    obstacles[i].passed = true;
                    player.money += MONEY_PER_CAR;
                    updateInGameUI();
                }

                // Remove off-screen obstacles
                if (obstacles[i].y > gameArea.offsetHeight) {
                    obstacles[i].element.remove();
                    obstacles.splice(i, 1);
                }
            }

            // Police Cars movement and collision
            for (let i = policeCars.length - 1; i >= 0; i--) {
                policeCars[i].y -= player.speed * 1.5; // Moving faster than traffic
                policeCars[i].element.style.top = policeCars[i].y + 'px';

                if (isColliding(player, policeCars[i])) {
                    endGame();
                    return;
                }

                if (policeCars[i].y < -CAR_HEIGHT * 2) {
                    policeCars[i].element.remove();
                    policeCars.splice(i, 1);
                }
            }

            // Game over check based on time (e.g., nitro active during police?) - No.
            // Check nitro duration
            if (player.nitroActive && Date.now() - player.nitroStartTime >= NITRO_DURATION) {
                deactivateNitro();
            }

            // Update distance
            player.distance += player.speed / 20;
            scoreDisplay.innerText = `Distans: ${Math.floor(player.distance)}m`;

            gameLoopId = requestAnimationFrame(gameLoop);
        }

        function isColliding(p, o) {
            return (
                p.x < o.x + CAR_WIDTH &&
                p.x + CAR_WIDTH > o.x &&
                gameArea.offsetHeight - CAR_HEIGHT - 20 < o.y + CAR_HEIGHT &&
                gameArea.offsetHeight - 20 > o.y
            );
        }

        function updateInGameUI() {
            moneyDisplay.innerText = `Pengar: ${player.money} kr`;
            document.getElementById('end-score').innerText = Math.floor(player.distance);
            document.getElementById('end-money').innerText = player.money;

            const nitroStatus = document.getElementById('nitro-display');
            if (player.nitroActive) {
                nitroStatusDisplay.innerText = "AKTIV!";
                nitroStatus.classList.add('ready');
                nitroBar.style.width = ((NITRO_DURATION - (Date.now() - player.nitroStartTime)) / NITRO_DURATION) * 100 + "%";
            } else if (player.nitroReady) {
                nitroStatusDisplay.innerText = "Redo! (Tryck N)";
                nitroStatus.classList.add('ready');
                nitroBar.style.width = "100%";
            } else {
                nitroStatusDisplay.innerText = "Laddar...";
                nitroStatus.classList.remove('ready');
                // The recharge visual update is handled separately by the recharge interval
            }
        }

        // --- Nitro System ---

        function tryActivateNitro() {
            if (isGameRunning && player.nitroReady && !player.nitroActive) {
                player.nitroActive = true;
                player.nitroReady = false;
                player.nitroStartTime = Date.now();
                player.speed = player.originalSpeed * NITRO_SPEED_MULTIPLIER;
                updateInGameUI();
                player.element.style.boxShadow = "0 0 20px gold, 0 4px 8px rgba(0,0,0,0.5)"; // Glow
                
                // Recharge progress bar update
                let rechargeProgress = 0;
                let rechargeBarInterval = setInterval(() => {
                    if (!player.nitroActive) {
                        rechargeProgress += 100 / (NITRO_RECHARGE_TIME / 100);
                        nitroBar.style.width = rechargeProgress + "%";
                        if (rechargeProgress >= 100) clearInterval(rechargeBarInterval);
                    }
                }, 100);

            }
        }

        function deactivateNitro() {
            player.nitroActive = false;
            player.speed = player.originalSpeed;
            updateInGameUI();
            player.element.style.boxShadow = "0 4px 8px rgba(0,0,0,0.5)"; // Normal

            // Start recharge timer
            clearTimeout(nitroRechargeTimer);
            nitroRechargeTimer = setTimeout(() => {
                player.nitroReady = true;
                updateInGameUI();
            }, NITRO_RECHARGE_TIME);
        }

        // --- Obstacle Spawning ---

        function spawnObstacles() {
            createObstacleCar();
            carSpawnTimer = setTimeout(spawnObstacles, randomInt(MIN_CAR_SPAWN_INTERVAL, MAX_CAR_SPAWN_INTERVAL));
        }

        // --- Traffic Lights and Police ---

        function scheduleTrafficLight() {
            trafficLightSequenceTimer = setTimeout(startTrafficLightSequence, randomInt(TRAFFIC_LIGHT_MIN_INTERVAL, TRAFFIC_LIGHT_MAX_INTERVAL));
        }

        function startTrafficLightSequence() {
            if (!isGameRunning) return;

            trafficLightContainer.style.display = 'flex';
            setTrafficLightState('green');

            setTimeout(() => {
                setTrafficLightState('yellow');
                setTimeout(() => {
                    setTrafficLightState('red');
                    spawnPoliceCars();
                    setTimeout(() => {
                        trafficLightContainer.style.display = 'none';
                        scheduleTrafficLight(); // Schedule next
                    }, randomInt(5000, 10000)); // Red time
                }, 3000); // Yellow time
            }, 3000); // Green time
        }

        function setTrafficLightState(color) {
            document.getElementById('light-green').className = 'light';
            document.getElementById('light-yellow').className = 'light';
            document.getElementById('light-red').className = 'light';
            document.getElementById(`light-${color}`).className = `light ${color}`;
        }

        function spawnPoliceCars() {
            if (!isGameRunning) return;
            // Spawn 1-2 police cars across lanes
            const lanes = [0, 1];
            lanes.sort(() => Math.random() - 0.5); // Random order
            const numPolice = Math.random() < 0.3 ? 1 : 2; // 30% chance for only 1

            for (let i = 0; i < numPolice; i++) {
                createPoliceCar(lanes[i]);
            }
        }

        // --- Game Over ---

        function endGame() {
            isGameRunning = false;
            clearInterval(gameLoopId);
            clearTimeout(carSpawnTimer);
            clearTimeout(trafficLightSequenceTimer);
            clearTimeout(policeSequenceTimer);

            // Update persistent data
            totalDistance += Math.floor(player.distance / 1000); // Convert meters to km
            persistentMoney += player.money;
            localStorage.setItem('totalDistance', totalDistance);
            localStorage.setItem('persistentMoney', persistentMoney);
            
            messageDisplay.style.display = 'block';
            gameArea.style.display = 'none';
        }

        function showMainMenu() {
            messageDisplay.style.display = 'none';
            document.getElementById('main-menu').style.display = 'flex';
            gameArea.style.display = 'none';
            updateMenuDisplays();
        }

        // --- Garage System ---

        function showGarage() {
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById('garage-menu').style.display = 'flex';
            renderCarList();
        }

        function backFromGarage() {
            document.getElementById('main-menu').style.display = 'flex';
            document.getElementById('garage-menu').style.display = 'none';
        }

        function renderCarList() {
            const carList = document.getElementById('car-list');
            carList.innerHTML = '';

            CAR_DB.forEach((car, index) => {
                const carCard = document.createElement('div');
                carCard.style.cssText = `border: 2px solid ${car.color}; padding: 10px; border-radius: 5px; width: 120px; text-align: center;`;
                const isOwned = ownedCars.includes(index);
                const isActive = player.activeCarIndex === index;

                carCard.innerHTML = `
                    <p style="color: ${car.color}; font-weight: bold;">${car.name}</p>
                    <div style="width: 30px; height: 50px; margin: 5px auto; border: 2px solid ${car.color}; border-radius: 3px; background-color: ${car.color};"></div>
                    <p>Fart: ${car.speed * 1000}%</p>
                    <p>Pris: ${car.cost} kr</p>
                `;

                const actionBtn = document.createElement('button');
                if (isActive) {
                    actionBtn.innerText = "VALD";
                    actionBtn.disabled = true;
                } else if (isOwned) {
                    actionBtn.innerText = "VÄLJ";
                    actionBtn.addEventListener('click', () => {
                        player.activeCarIndex = index;
                        localStorage.setItem('activeCarIndex', index);
                        renderCarList();
                    });
                } else {
                    actionBtn.innerText = `KÖP (${car.cost})`;
                    if (persistentMoney < car.cost) {
                        actionBtn.disabled = true;
                    } else {
                        actionBtn.addEventListener('click', () => {
                            persistentMoney -= car.cost;
                            ownedCars.push(index);
                            player.activeCarIndex = index;
                            localStorage.setItem('persistentMoney', persistentMoney);
                            localStorage.setItem('ownedCars', JSON.stringify(ownedCars));
                            localStorage.setItem('activeCarIndex', index);
                            updateMenuDisplays();
                            renderCarList();
                        });
                    }
                }
                carCard.appendChild(actionBtn);
                carList.appendChild(carCard);
            });
        }

        // --- Tracks System ---

        function showTracks() {
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById('tracks-menu').style.display = 'flex';
            
            const trackButtons = document.querySelectorAll('.track-btn');
            trackButtons.forEach(btn => {
                const requiredDistance = parseInt(btn.getAttribute('data-req'));
                const trackKey = btn.getAttribute('data-track');
                const track = TRACK_DB[trackKey];
                
                btn.innerText = `${track.name} (${requiredDistance} km)`;
                
                if (totalDistance >= requiredDistance) {
                    btn.disabled = false;
                    btn.addEventListener('click', () => {
                        applyTrack(trackKey);
                        backFromTracks();
                    });
                } else {
                    btn.disabled = true;
                }
            });
        }

        function backFromTracks() {
            document.getElementById('main-menu').style.display = 'flex';
            document.getElementById('tracks-menu').style.display = 'none';
        }

        // Helper
        function randomInt(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

        // Load game
        init();

    </script>
</body>
</html>
