<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <title>Retro Racer - Top Down</title>
    <style>
        body { margin: 0; background: #333; font-family: 'Courier New', Courier, monospace; color: white; overflow: hidden; }
        #game-container { position: relative; width: 400px; height: 600px; margin: 20px auto; background: #555; border: 4px solid #fff; overflow: hidden; }
        #road { position: absolute; width: 100%; height: 100%; background: #444; }
        .line { position: absolute; width: 10px; height: 50px; background: white; left: 195px; }
        
        /* UI Menyer */
        .menu-overlay { position: absolute; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; }
        button { padding: 10px 20px; margin: 10px; cursor: pointer; background: #f1c40f; border: none; font-weight: bold; width: 200px; }
        button:hover { background: #d4ac0d; }
        
        .car { position: absolute; border-radius: 2px; }
        .player { background: #e74c3c; width: 40px; height: 60px; z-index: 5; }
        .enemy { width: 40px; height: 60px; }
        .oil { position: absolute; width: 50px; height: 30px; background: rgba(0,0,0,0.6); border-radius: 50%; }
        
        #stats { position: absolute; top: 10px; left: 10px; z-index: 6; }
        .hidden { display: none !important; }
        
        /* Nitro effekt */
        .nitro-active { box-shadow: 0 0 20px #3498db; border: 2px solid #3498db; }
        #traffic-light { position: absolute; top: 20px; right: 20px; width: 30px; height: 80px; background: #111; border-radius: 5px; display: flex; flex-direction: column; align-items: center; justify-content: space-around; padding: 5px; }
        .light { width: 20px; height: 20px; border-radius: 50%; background: #333; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="stats">Pengar: <span id="money">0</span>kr | Km: <span id="dist">0</span></div>
    
    <div id="traffic-light">
        <div id="light-red" class="light"></div>
        <div id="light-yellow" class="light"></div>
        <div id="light-green" class="light"></div>
    </div>

    <div id="main-menu" class="menu-overlay">
        <h1>RETRO RACER</h1>
        <button onclick="startGame()">STARTA RACE</button>
        <button onclick="showGarage()">GARAGE</button>
        <button onclick="showTracks()">BYT TRACK</button>
    </div>

    <div id="garage-menu" class="menu-overlay hidden">
        <h2>GARAGE</h2>
        <div id="car-list"></div>
        <button onclick="hideMenus()">TILLBAKA</button>
    </div>

    <div id="track-menu" class="menu-overlay hidden">
        <h2>VÄLJ BANA</h2>
        <div id="track-list"></div>
        <button onclick="hideMenus()">TILLBAKA</button>
    </div>

    <div id="road"></div>
    <div id="player" class="car player"></div>
</div>

<script>
// --- KONFIGURATION & STATE ---
let state = {
    money: parseInt(localStorage.getItem('money')) || 0,
    totalDist: parseInt(localStorage.getItem('totalDist')) || 0,
    ownedCars: JSON.parse(localStorage.getItem('ownedCars')) || [0],
    currentCar: 0,
    currentTrack: 0,
    gameActive: false,
    speed: 5,
    distance: 0,
    nitroAvailable: true,
    isNitro: false,
    isStunned: false
};

const tracks = [
    { name: "City", color: "#444", req: 0 },
    { name: "Forest", color: "#2d5a27", req: 1000 },
    { name: "Desert", color: "#d4a373", req: 5000 },
    { name: "Snow", color: "#fff", req: 10000 },
    { name: "Night", color: "#1a1a1a", req: 20000 }
];

const carModels = [
    { name: "Volvo 240", color: "#e74c3c", price: 0 },
    { name: "Sport", color: "#3498db", price: 500 },
    { name: "Truck", color: "#f1c40f", price: 1500 },
    { name: "Super", color: "#9b59b6", price: 5000 },
    { name: "Batman", color: "#222", price: 10000 }
];

const enemyColors = ["#1abc9c", "#2ecc71", "#e67e22", "#95a5a6", "#34495e"];

// --- DOM ELEMENT ---
const road = document.getElementById('road');
const player = document.getElementById('player');
const moneyEl = document.getElementById('money');
const distEl = document.getElementById('dist');

// --- KONTROLLER ---
let keys = {};
document.addEventListener('keydown', e => {
    keys[e.code] = true;
    if(e.code === 'Space' && state.nitroAvailable && state.gameActive) activateNitro();
});
document.addEventListener('keyup', e => keys[e.code] = false);

// --- SPEL-LOGIK ---
function startGame() {
    hideMenus();
    state.gameActive = true;
    state.speed = 5;
    state.distance = 0;
    resetPlayer();
    gameLoop();
    startTraficLightCycle();
}

function resetPlayer() {
    player.style.left = "180px";
    player.style.top = "500px";
    player.style.backgroundColor = carModels[state.currentCar].color;
    road.style.backgroundColor = tracks[state.currentTrack].color;
}

function spawnEnemy() {
    if(!state.gameActive) return;
    const enemy = document.createElement('div');
    enemy.className = 'car enemy';
    enemy.style.backgroundColor = enemyColors[Math.floor(Math.random() * 5)];
    enemy.style.left = Math.random() * (400 - 40) + "px";
    enemy.style.top = "-100px";
    road.appendChild(enemy);
    
    // Flytta bil
    let moveInterval = setInterval(() => {
        if(!state.gameActive) { clearInterval(moveInterval); enemy.remove(); return; }
        let top = parseInt(enemy.style.top);
        enemy.style.top = (top + state.speed) + "px";

        // Kolla kollision
        if (isColliding(player, enemy)) gameOver();

        // Passera bil - tjäna pengar
        if (top > 600) {
            state.money += 10;
            updateUI();
            clearInterval(moveInterval);
            enemy.remove();
        }
    }, 1000/60);

    setTimeout(spawnEnemy, Math.random() * 2000 + 500);
}

function spawnOil() {
    if(!state.gameActive) return;
    const oil = document.createElement('div');
    oil.className = 'oil';
    oil.style.left = Math.random() * (400 - 50) + "px";
    oil.style.top = "-50px";
    road.appendChild(oil);

    let moveInterval = setInterval(() => {
        if(!state.gameActive) { clearInterval(moveInterval); oil.remove(); return; }
        let top = parseInt(oil.style.top);
        oil.style.top = (top + state.speed) + "px";

        if(isColliding(player, oil) && !state.isStunned) {
            applyOilEffect();
        }

        if(top > 600) { clearInterval(moveInterval); oil.remove(); }
    }, 1000/60);

    setTimeout(spawnOil, 5000);
}

function applyOilEffect() {
    state.isStunned = true;
    player.style.transform = "rotate(20deg)";
    setTimeout(() => {
        state.isStunned = false;
        player.style.transform = "rotate(0deg)";
    }, 1000);
}

function activateNitro() {
    state.nitroAvailable = false;
    state.isNitro = true;
    state.speed *= 2;
    player.classList.add('nitro-active');
    
    setTimeout(() => {
        state.speed /= 2;
        state.isNitro = false;
        player.classList.remove('nitro-active');
    }, 4000);

    setTimeout(() => { state.nitroAvailable = true; }, 10000);
}

function gameLoop() {
    if(!state.gameActive) return;

    // Rörelse
    let left = parseInt(player.style.left);
    if(!state.isStunned) {
        if(keys['ArrowLeft'] && left > 0) player.style.left = (left - 5) + "px";
        if(keys['ArrowRight'] && left < 360) player.style.left = (left + 5) + "px";
    }

    // Öka svårighetsgrad
    state.distance += 0.5;
    if(Math.floor(state.distance) % 50 === 0) state.speed += 0.01;

    updateUI();
    requestAnimationFrame(gameLoop);
}

// --- HJÄLPFUNKTIONER ---
function isColliding(a, b) {
    let aRect = a.getBoundingClientRect();
    let bRect = b.getBoundingClientRect();
    return !(aRect.top > bRect.bottom || aRect.bottom < bRect.top || aRect.right < bRect.left || aRect.left > bRect.right);
}

function updateUI() {
    moneyEl.innerText = state.money;
    distEl.innerText = Math.floor(state.distance);
}

function gameOver() {
    state.gameActive = false;
    state.totalDist += Math.floor(state.distance);
    saveGame();
    alert("GAME OVER! Du samlade: " + state.money + "kr");
    location.reload(); // Enkelt sätt att nollställa banan
}

function saveGame() {
    localStorage.setItem('money', state.money);
    localStorage.setItem('totalDist', state.totalDist);
    localStorage.setItem('ownedCars', JSON.stringify(state.ownedCars));
}

function hideMenus() {
    document.querySelectorAll('.menu-overlay').forEach(m => m.classList.add('hidden'));
}

// --- TRAFIKLJUS LOGIK ---
function startTraficLightCycle() {
    const lights = {
        red: document.getElementById('light-red'),
        yellow: document.getElementById('light-yellow'),
        green: document.getElementById('light-green')
    };

    setInterval(() => {
        // Enkel cykel: Grön -> Gul -> Röd (Extra bilar)
        setTimeout(() => lights.green.style.backgroundColor = '#2ecc71', 0);
        setTimeout(() => { lights.green.style.backgroundColor = '#333'; lights.yellow.style.backgroundColor = '#f1c40f'; }, 20000);
        setTimeout(() => { 
            lights.yellow.style.backgroundColor = '#333'; 
            lights.red.style.backgroundColor = '#e74c3c';
            // Spawn extra bilar (polisen)
            for(let i=0; i<3; i++) setTimeout(spawnEnemy, i*500);
        }, 25000);
        setTimeout(() => lights.red.style.backgroundColor = '#333', 35000);
    }, 40000);
}

// Kör igång spawner
spawnEnemy();
spawnOil();
</script>
</body>
</html>
