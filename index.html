<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <title>Retro Racer - Turbo Edition</title>
    <style>
        :root {
            --road-color: #333;
            --line-color: #fff;
        }
        body { margin: 0; background: #222; font-family: 'Courier New', Courier, monospace; color: white; overflow: hidden; text-align: center; }
        
        /* Menysystem */
        #ui-layer { position: absolute; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.8); z-index: 10; }
        .menu-btn { padding: 15px 30px; margin: 10px; font-size: 20px; cursor: pointer; background: #e74c3c; border: none; color: white; border-radius: 5px; width: 250px; }
        .menu-btn:hover { background: #c0392b; }
        .hidden { display: none !important; }

        /* Spelplanen */
        #game-container { position: relative; width: 400px; height: 100vh; margin: 0 auto; background: var(--road-color); overflow: hidden; border-left: 5px solid white; border-right: 5px solid white; }
        .road-line { position: absolute; width: 10px; height: 50px; background: var(--line-color); left: 195px; animation: moveRoad 1s linear infinite; }
        
        @keyframes moveRoad {
            0% { top: -100px; }
            100% { top: 100vh; }
        }

        /* Bilarna */
        .car { position: absolute; width: 50px; height: 80px; border-radius: 4px; transition: transform 0.1s; }
        #player { background: #3498db; z-index: 5; box-shadow: 0 0 15px #3498db; }
        .enemy { background: #e67e22; }
        .oil { position: absolute; width: 60px; height: 40px; background: rgba(0,0,0,0.6); border-radius: 50%; }
        
        /* HUD */
        #hud { position: absolute; top: 10px; left: 10px; text-align: left; pointer-events: none; z-index: 6; }
        #traffic-light { position: absolute; top: 20px; right: 20px; width: 30px; height: 90px; background: #000; border-radius: 5px; display: flex; flex-direction: column; align-items: center; justify-content: space-around; padding: 5px; }
        .light { width: 20px; height: 20px; border-radius: 50%; background: #333; }
        
        /* Nitro Animation */
        .nitro-active { box-shadow: 0 15px 30px #f1c40f !important; transform: scale(1.1); }
        .spin { animation: spin 1s linear; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="hud">
        Distans: <span id="dist-val">0</span> km<br>
        Pengar: <span id="money-val">0</span> kr<br>
        Nitro: <span id="nitro-val">Redo</span> (Space)
    </div>

    <div id="traffic-light">
        <div id="light-red" class="light"></div>
        <div id="light-yellow" class="light"></div>
        <div id="light-green" class="light"></div>
    </div>

    <div id="ui-layer">
        <h1 id="menu-title">RETRO RACER</h1>
        <div id="main-menu">
            <button class="menu-btn" onclick="startGame()">STARTA RACE</button>
            <button class="menu-btn" onclick="showGarage()">GARAGE</button>
            <button class="menu-btn" onclick="showTracks()">BYT TRACK</button>
        </div>
        
        <div id="garage-menu" class="hidden">
            <h2>Köp nya bilar</h2>
            <div id="car-list"></div>
            <button class="menu-btn" onclick="backToMain()">TILLBAKA</button>
        </div>

        <div id="track-menu" class="hidden">
            <h2>Välj bana (Kräver total distans)</h2>
            <div id="track-list"></div>
            <button class="menu-btn" onclick="backToMain()">TILLBAKA</button>
        </div>
    </div>

    <div id="game-container">
        <div id="player"></div>
    </div>

<script>
// --- Speldata & State ---
let gameState = {
    money: parseInt(localStorage.getItem('money')) || 0,
    totalDistance: parseInt(localStorage.getItem('totalDist')) || 0,
    ownedCars: JSON.parse(localStorage.getItem('ownedCars')) || [0],
    currentCar: 0,
    currentTrack: 0,
    dist: 0,
    speed: 5,
    playing: false,
    nitroReady: true,
    isSpinning: false,
    lightStatus: 'green' // green, yellow, red
};

const tracks = [
    { name: "Standard", color: "#333", req: 0 },
    { name: "Öken", color: "#edc9af", req: 1000 },
    { name: "Midnatt", color: "#1a1a2e", req: 5000 },
    { name: "Skog", color: "#2d5a27", req: 10000 },
    { name: "Cyberpunk", color: "#240046", req: 25000 }
];

const cars = [
    { name: "Volvo 240", price: 0, color: "#3498db" },
    { name: "Sport", price: 500, color: "#e74c3c" },
    { name: "Limousine", price: 1500, color: "#f1c40f" },
    { name: "Truck", price: 3000, color: "#2ecc71" },
    { name: "F1", price: 10000, color: "#9b59b6" }
];

// --- Initiering ---
const player = document.getElementById('player');
const container = document.getElementById('game-container');
let playerX = 175;
let keys = {};

document.addEventListener('keydown', e => keys[e.code] = true);
document.addEventListener('keyup', e => keys[e.code] = false);

// --- Huvudfunktioner ---
function startGame() {
    document.getElementById('ui-layer').classList.add('hidden');
    gameState.playing = true;
    gameState.dist = 0;
    gameState.speed = 5;
    playerX = 175;
    
    // Rensa gamla objekt
    document.querySelectorAll('.enemy, .oil, .road-line').forEach(el => el.remove());
    
    gameLoop();
    spawnTrafficLightSystem();
}

function gameLoop() {
    if(!gameState.playing) return;

    // Rörelse
    if(keys['ArrowLeft'] && playerX > 0 && !gameState.isSpinning) playerX -= 5;
    if(keys['ArrowRight'] && playerX < 350 && !gameState.isSpinning) playerX += 5;
    if(keys['Space'] && gameState.nitroReady) activateNitro();

    player.style.left = playerX + 'px';
    player.style.background = cars[gameState.currentCar].color;

    // Uppdatera distans och hastighet
    gameState.dist += 1;
    if(gameState.dist % 50 === 0) gameState.speed += 0.2;
    
    document.getElementById('dist-val').innerText = Math.floor(gameState.dist / 10);
    document.getElementById('money-val').innerText = gameState.money;

    // Skapa miljö
    if(gameState.dist % 20 === 0) createRoadLine();
    if(gameState.dist % 60 === 0) spawnEnemy();
    if(gameState.dist % 150 === 0) spawnOil();

    requestAnimationFrame(gameLoop);
}

function spawnEnemy() {
    const enemy = document.createElement('div');
    enemy.classList.add('car', 'enemy');
    
    // 5 olika fiendemodeller (färger)
    const enemyColors = ['#e67e22', '#95a5a6', '#d35400', '#7f8c8d', '#16a085'];
    enemy.style.background = enemyColors[Math.floor(Math.random() * enemyColors.length)];
    
    // Vid rött ljus: Polisbilar
    if(gameState.lightStatus === 'red') {
        enemy.style.background = 'blue';
        enemy.style.borderLeft = '5px solid red'; 
    }

    enemy.style.left = Math.random() * 350 + 'px';
    enemy.style.top = '-100px';
    container.appendChild(enemy);

    let moveEnemy = setInterval(() => {
        if(!gameState.playing) { clearInterval(moveEnemy); return; }
        
        let top = parseInt(enemy.style.top);
        enemy.style.top = (top + gameState.speed) + 'px';

        // Kollision
        if(isColliding(player, enemy)) gameOver();

        // Passera bil (Pengar)
        if(top > window.innerHeight) {
            gameState.money += 10;
            enemy.remove();
            clearInterval(moveEnemy);
        }
    }, 10);
}

function spawnOil() {
    const oil = document.createElement('div');
    oil.classList.add('oil');
    oil.style.left = Math.random() * 340 + 'px';
    oil.style.top = '-100px';
    container.appendChild(oil);

    let moveOil = setInterval(() => {
        if(!gameState.playing) { clearInterval(moveOil); return; }
        let top = parseInt(oil.style.top);
        oil.style.top = (top + gameState.speed) + 'px';

        if(isColliding(player, oil) && !gameState.isSpinning) {
            gameState.isSpinning = true;
            player.classList.add('spin');
            setTimeout(() => { 
                gameState.isSpinning = false; 
                player.classList.remove('spin');
            }, 1000);
        }
        if(top > window.innerHeight) { oil.remove(); clearInterval(moveOil); }
    }, 10);
}

function spawnTrafficLightSystem() {
    setInterval(() => {
        if(!gameState.playing) return;
        
        // Gult
        gameState.lightStatus = 'yellow';
        updateLights('#555', '#f1c40f', '#555');
        
        setTimeout(() => {
            // Rött (Extra bilar/polis)
            gameState.lightStatus = 'red';
            updateLights('#e74c3c', '#555', '#555');
            
            setTimeout(() => {
                // Grönt
                gameState.lightStatus = 'green';
                updateLights('#555', '#555', '#2ecc71');
            }, 10000);
        }, 2000);
    }, 35000);
}

function activateNitro() {
    gameState.nitroReady = false;
    let oldSpeed = gameState.speed;
    gameState.speed *= 2;
    player.classList.add('nitro-active');
    document.getElementById('nitro-val').innerText = "AKTIV!";
    
    setTimeout(() => {
        gameState.speed = oldSpeed;
        player.classList.remove('nitro-active');
        document.getElementById('nitro-val').innerText = "Laddar...";
        setTimeout(() => {
            gameState.nitroReady = true;
            document.getElementById('nitro-val').innerText = "Redo";
        }, 10000);
    }, 4000);
}

// --- Hjälpfunktioner ---
function isColliding(a, b) {
    let aRect = a.getBoundingClientRect();
    let bRect = b.getBoundingClientRect();
    return !(aRect.top > bRect.bottom || aRect.bottom < bRect.top || aRect.right < bRect.left || aRect.left > bRect.right);
}

function updateLights(r, y, g) {
    document.getElementById('light-red').style.background = r;
    document.getElementById('light-yellow').style.background = y;
    document.getElementById('light-green').style.background = g;
}

function createRoadLine() {
    const line = document.createElement('div');
    line.classList.add('road-line');
    line.style.top = '-50px';
    container.appendChild(line);
    setTimeout(() => line.remove(), 3000);
}

function gameOver() {
    gameState.playing = false;
    gameState.totalDistance += Math.floor(gameState.dist / 10);
    saveData();
    alert("GAME OVER! Du tjänade: " + (gameState.money) + " kr");
    location.reload(); 
}

// --- Menylogik ---
function showGarage() {
    document.getElementById('main-menu').classList.add('hidden');
    document.getElementById('garage-menu').classList.remove('hidden');
    const list = document.getElementById('car-list');
    list.innerHTML = '';
    
    cars.forEach((car, index) => {
        const btn = document.createElement('button');
        const isOwned = gameState.ownedCars.includes(index);
        btn.className = 'menu-btn';
        btn.innerHTML = `${car.name} ${isOwned ? '(ÄGD)' : car.price + 'kr'}`;
        btn.onclick = () => {
            if(isOwned) {
                gameState.currentCar = index;
                alert("Bil vald!");
            } else if(gameState.money >= car.price) {
                gameState.money -= car.price;
                gameState.ownedCars.push(index);
                saveData();
                showGarage();
            } else {
                alert("För lite pengar!");
            }
        };
        list.appendChild(btn);
    });
}

function showTracks() {
    document.getElementById('main-menu').classList.add('hidden');
    document.getElementById('track-menu').classList.remove('hidden');
    const list = document.getElementById('track-list');
    list.innerHTML = `<p>Total distans: ${gameState.totalDistance} km</p>`;
    
    tracks.forEach((track, index) => {
        const btn = document.createElement('button');
        const isLocked = gameState.totalDistance < track.req;
        btn.className = 'menu-btn';
        btn.style.background = isLocked ? '#555' : '#2ecc71';
        btn.innerHTML = `${track.name} ${isLocked ? '(' + track.req + 'km)' : ''}`;
        btn.onclick = () => {
            if(!isLocked) {
                gameState.currentTrack = index;
                document.documentElement.style.setProperty('--road-color', track.color);
                alert("Bana vald!");
            }
        };
        list.appendChild(btn);
    });
}

function backToMain() {
    document.querySelectorAll('#garage-menu, #track-menu').forEach(el => el.classList.add('hidden'));
    document.getElementById('main-menu').classList.remove('hidden');
}

function saveData() {
    localStorage.setItem('money', gameState.money);
    localStorage.setItem('totalDist', gameState.totalDistance);
    localStorage.setItem('ownedCars', JSON.stringify(gameState.ownedCars));
}

function createRoadLine() {
    const line = document.createElement('div');
    line.classList.add('road-line');
    line.style.top = '-100px';
    // Justera hastighet på linjerna baserat på spelets fart
    line.style.animationDuration = (2 / (gameState.speed / 5)) + "s";
    container.appendChild(line);
    setTimeout(() => line.remove(), 2000);
}
</script>
</body>
</html>
