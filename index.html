<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Overdrive Fixed</title>
    <style>
        :root {
            --bg-color: #0a0a12;
            --road-color: #1a1a2e;
            --line-color: rgba(255, 255, 255, 0.8);
            --player-neon: #00f2fe;
            --player-body: #4facfe;
            --enemy-neon: #ff0055;
            --oil-color: rgba(20, 20, 20, 0.9);
            --text-color: #fff;
            --accent-color: #f39c12;
            --ui-bg: rgba(10, 10, 18, 0.98);
            --track-border: #fff;
        }

        * { box-sizing: border-box; }
        body { margin: 0; background: var(--bg-color); color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }

        /* --- UI & MENY FIX --- */
        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--ui-bg); z-index: 1000; display: flex;
            flex-direction: column; align-items: center; justify-content: center;
            pointer-events: all; /* Säkerställer att klick går igenom */
        }

        .menu-section { display: flex; flex-direction: column; align-items: center; width: 100%; z-index: 1001; }
        .hidden { display: none !important; }

        h1 { font-size: 50px; text-shadow: 0 0 20px var(--player-neon); margin-bottom: 30px; text-align: center; }

        .menu-btn {
            background: rgba(255,255,255,0.05); border: 2px solid var(--player-neon); color: var(--player-neon);
            padding: 15px 40px; font-size: 18px; font-weight: bold; cursor: pointer;
            margin: 10px; border-radius: 5px; width: 280px; transition: 0.3s;
            position: relative; z-index: 1002;
        }
        .menu-btn:hover { background: var(--player-neon); color: #000; box-shadow: 0 0 20px var(--player-neon); }

        .list-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; max-width: 900px; margin-bottom: 20px; overflow-y: auto; }

        .card {
            background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.2);
            border-radius: 8px; padding: 15px; width: 180px; text-align: center; cursor: pointer;
            transition: 0.2s;
        }
        .card:hover { border-color: var(--player-neon); background: rgba(255,255,255,0.2); }
        .card.selected { border-color: var(--accent-color); box-shadow: 0 0 15px var(--accent-color); }
        .card.locked { opacity: 0.4; cursor: not-allowed; }

        /* --- SPELPLAN --- */
        #game-screen { position: relative; width: 450px; height: 100vh; background: var(--road-color); border-left: 6px solid var(--track-border); border-right: 6px solid var(--track-border); overflow: hidden; z-index: 1; }
        
        .road-lines {
            position: absolute; width: 100%; height: 100%; top: 0;
            background-image: linear-gradient(to bottom, var(--line-color) 50%, transparent 50%);
            background-size: 8px 100px; background-position: center 0;
            animation: roadMove 1s linear infinite;
        }
        @keyframes roadMove { from { background-position: center 0; } to { background-position: center 100px; } }

        /* --- BILAR & OBJEKT --- */
        .car { position: absolute; width: 50px; height: 90px; border-radius: 6px; z-index: 10; }
        #player { bottom: 80px; left: 200px; background: var(--player-body); box-shadow: 0 0 20px var(--player-neon); transition: transform 0.2s; }
        #player::before { content: ''; position: absolute; top: 15px; left: 7px; width: 36px; height: 15px; background: #000; border-radius: 3px; }

        .enemy { background: #ff4b1f; box-shadow: 0 0 15px #ff0055; }
        .oil { position: absolute; width: 60px; height: 40px; background: rgba(0,0,0,0.8); border-radius: 50%; z-index: 5; }

        /* --- HUD --- */
        #hud { position: absolute; top: 20px; left: 20px; z-index: 500; background: rgba(0,0,0,0.7); padding: 10px; border-radius: 5px; border: 1px solid var(--player-neon); pointer-events: none; }
        #nitro-bar { width: 100px; height: 10px; background: #333; margin-top: 5px; border-radius: 5px; overflow: hidden; }
        #nitro-fill { width: 100%; height: 100%; background: var(--player-neon); transition: width 0.1s linear; }

        #traffic-light { position: absolute; top: 20px; right: 20px; width: 35px; height: 100px; background: #000; border-radius: 5px; display: flex; flex-direction: column; align-items: center; justify-content: space-around; padding: 5px; z-index: 500; pointer-events: none; }
        .light { width: 22px; height: 22px; border-radius: 50%; background: #222; }
        #light-red.active { background: #ff0000; box-shadow: 0 0 10px #ff0000; }
        #light-yellow.active { background: #fffa00; box-shadow: 0 0 10px #fffa00; }
        #light-green.active { background: #00ff00; box-shadow: 0 0 10px #00ff00; }

        .spin { animation: spin 0.8s linear; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div id="main-menu" class="menu-section">
            <h1>NEON OVERDRIVE</h1>
            <button class="menu-btn" onclick="startGame()">STARTA RACE</button>
            <button class="menu-btn" onclick="showGarage()">GARAGE</button>
            <button class="menu-btn" onclick="showTracks()">BYT TRACK</button>
        </div>

        <div id="garage-menu" class="menu-section hidden">
            <h1>GARAGE</h1>
            <p>Dina Pengar: <span id="garage-money">0</span> kr</p>
            <div id="car-list" class="list-container"></div>
            <button class="menu-btn" onclick="backToMain()">TILLBAKA</button>
        </div>

        <div id="track-menu" class="menu-section hidden">
            <h1>VÄLJ BANA</h1>
            <p>Total Distans: <span id="track-total-dist">0</span> km</p>
            <div id="track-list" class="list-container"></div>
            <button class="menu-btn" onclick="backToMain()">TILLBAKA</button>
        </div>
    </div>

    <div id="hud">
        Dist: <span id="dist-val">0</span> km<br>
        Kr: <span id="money-val">0</span><br>
        Nitro: <div id="nitro-bar"><div id="nitro-fill"></div></div>
    </div>

    <div id="traffic-light">
        <div id="light-red" class="light"></div>
        <div id="light-yellow" class="light"></div>
        <div id="light-green" class="light active"></div>
    </div>

    <div id="game-screen">
        <div class="road-lines" id="road-lines"></div>
        <div id="player" class="car"></div>
    </div>

<script>
// --- DATA ---
const carsData = [
    { id: 0, name: "Scout", price: 0, color: "#4facfe", neon: "#00f2fe" },
    { id: 1, name: "Fury", price: 500, color: "#ff4b1f", neon: "#ff0055" },
    { id: 2, name: "Viper", price: 1500, color: "#27ae60", neon: "#00ff00" },
    { id: 3, name: "Venom", price: 3000, color: "#8e44ad", neon: "#e056fd" },
    { id: 4, name: "Ghost", price: 10000, color: "#ffffff", neon: "#ffffff" }
];

const tracksData = [
    { id: 0, name: "City", road: "#1a1a2e", border: "#fff", req: 0 },
    { id: 1, name: "Desert", road: "#3e2723", border: "#f39c12", req: 10 },
    { id: 2, name: "Forest", road: "#0a2e0a", border: "#00ff00", req: 50 },
    { id: 3, name: "Void", road: "#000000", border: "#e056fd", req: 100 },
    { id: 4, name: "Magma", road: "#2e0a0a", border: "#ff0000", req: 250 }
];

// --- STATE ---
let gameState = {
    money: parseInt(localStorage.getItem('money')) || 0,
    totalDist: parseInt(localStorage.getItem('totalDist')) || 0,
    ownedCars: JSON.parse(localStorage.getItem('ownedCars')) || [0],
    currentCar: parseInt(localStorage.getItem('currentCar')) || 0,
    currentTrack: parseInt(localStorage.getItem('currentTrack')) || 0,
    playing: false,
    dist: 0,
    speed: 7,
    playerX: 200,
    nitroReady: true,
    light: 'green'
};

const player = document.getElementById('player');
const screen = document.getElementById('game-screen');
let keys = {};

document.addEventListener('keydown', e => keys[e.code] = true);
document.addEventListener('keyup', e => keys[e.code] = false);

// --- NAVIGATION ---
function showGarage() {
    document.getElementById('main-menu').classList.add('hidden');
    document.getElementById('track-menu').classList.add('hidden');
    document.getElementById('garage-menu').classList.remove('hidden');
    renderGarage();
}

function showTracks() {
    document.getElementById('main-menu').classList.add('hidden');
    document.getElementById('garage-menu').classList.add('hidden');
    document.getElementById('track-menu').classList.remove('hidden');
    renderTracks();
}

function backToMain() {
    document.getElementById('garage-menu').classList.add('hidden');
    document.getElementById('track-menu').classList.add('hidden');
    document.getElementById('main-menu').classList.remove('hidden');
}

// --- RENDERING ---
function renderGarage() {
    const list = document.getElementById('car-list');
    document.getElementById('garage-money').innerText = gameState.money;
    list.innerHTML = '';
    
    carsData.forEach(car => {
        const isOwned = gameState.ownedCars.includes(car.id);
        const card = document.createElement('div');
        card.className = `card ${gameState.currentCar === car.id ? 'selected' : ''}`;
        card.innerHTML = `
            <div style="width:30px;height:50px;background:${car.color};margin:10px auto;box-shadow:0 0 10px ${car.neon}; border-radius:3px;"></div>
            <b>${car.name}</b><br>
            ${isOwned ? '<span style="color:#00f2fe">VALD</span>' : car.price + ' kr'}
        `;
        card.onclick = (e) => {
            e.stopPropagation();
            if(isOwned) {
                gameState.currentCar = car.id;
                save(); renderGarage(); applySettings();
            } else if(gameState.money >= car.price) {
                gameState.money -= car.price;
                gameState.ownedCars.push(car.id);
                save(); renderGarage();
            } else {
                alert("För lite pengar!");
            }
        };
        list.appendChild(card);
    });
}

function renderTracks() {
    const list = document.getElementById('track-list');
    document.getElementById('track-total-dist').innerText = gameState.totalDist;
    list.innerHTML = '';

    tracksData.forEach(track => {
        const isLocked = gameState.totalDist < track.req;
        const card = document.createElement('div');
        card.className = `card ${isLocked ? 'locked' : ''} ${gameState.currentTrack === track.id ? 'selected' : ''}`;
        card.innerHTML = `
            <b>${track.name}</b><br>
            ${isLocked ? 'Kräver ' + track.req + 'km' : '<span style="color:#00f2fe">UPPLÅST</span>'}
        `;
        card.onclick = (e) => {
            e.stopPropagation();
            if(!isLocked) {
                gameState.currentTrack = track.id;
                save(); renderTracks(); applySettings();
            }
        };
        list.appendChild(card);
    });
}

// --- GAME LOGIC ---
function startGame() {
    document.getElementById('ui-layer').classList.add('hidden');
    gameState.playing = true;
    gameState.dist = 0;
    gameState.speed = 7;
    gameState.playerX = 200;
    
    document.querySelectorAll('.enemy, .oil').forEach(e => e.remove());
    applySettings();
    gameLoop();
    startTrafficLights();
}

function gameLoop() {
    if(!gameState.playing) return;

    if(keys.ArrowLeft && gameState.playerX > 0) gameState.playerX -= 8;
    if(keys.ArrowRight && gameState.playerX < 400) gameState.playerX += 8;
    if(keys.Space && gameState.nitroReady) activateNitro();

    player.style.left = gameState.playerX + 'px';
    gameState.dist += 0.1;
    if(Math.floor(gameState.dist) % 50 === 0) gameState.speed += 0.05;

    document.getElementById('dist-val').innerText = Math.floor(gameState.dist);
    document.getElementById('money-val').innerText = gameState.money;

    if(Math.random() < 0.02) spawnEnemy();
    if(Math.random() < 0.005) spawnOil();

    requestAnimationFrame(gameLoop);
}

function spawnEnemy() {
    const enemy = document.createElement('div');
    enemy.className = 'car enemy';
    if(gameState.light === 'red') { 
        enemy.style.background = 'blue'; 
        enemy.style.boxShadow = "0 0 15px blue, inset 0 0 10px white"; 
    } else {
        const colors = ['#e67e22', '#95a5a6', '#f1c40f', '#d35400', '#7f8c8d'];
        enemy.style.background = colors[Math.floor(Math.random()*5)];
    }
    enemy.style.left = Math.random() * 400 + 'px';
    enemy.style.top = '-100px';
    screen.appendChild(enemy);

    let move = setInterval(() => {
        if(!gameState.playing) { clearInterval(move); return; }
        let top = parseInt(enemy.style.top) + gameState.speed;
        enemy.style.top = top + 'px';

        if(checkColl(player, enemy)) gameOver();
        if(top > window.innerHeight) {
            gameState.money += 10;
            clearInterval(move); enemy.remove();
        }
    }, 10);
}

function spawnOil() {
    const oil = document.createElement('div');
    oil.className = 'oil';
    oil.style.left = Math.random() * 380 + 'px';
    oil.style.top = '-50px';
    screen.appendChild(oil);

    let move = setInterval(() => {
        if(!gameState.playing) { clearInterval(move); return; }
        let top = parseInt(oil.style.top) + gameState.speed;
        oil.style.top = top + 'px';

        if(checkColl(player, oil)) {
            player.classList.add('spin');
            setTimeout(() => player.classList.remove('spin'), 1000);
        }
        if(top > window.innerHeight) { clearInterval(move); oil.remove(); }
    }, 10);
}

function activateNitro() {
    gameState.nitroReady = false;
    gameState.speed *= 2;
    document.getElementById('nitro-fill').style.width = '0%';
    setTimeout(() => { 
        gameState.speed /= 2;
        setTimeout(() => {
            gameState.nitroReady = true;
            document.getElementById('nitro-fill').style.width = '100%';
        }, 10000);
    }, 4000);
}

function startTrafficLights() {
    setInterval(() => {
        if(!gameState.playing) return;
        setLight('yellow');
        setTimeout(() => {
            setLight('red');
            setTimeout(() => setLight('green'), 10000);
        }, 2000);
    }, 30000);
}

function setLight(c) {
    gameState.light = c;
    document.querySelectorAll('.light').forEach(l => l.classList.remove('active'));
    document.getElementById('light-' + c).classList.add('active');
}

function checkColl(a, b) {
    let r1 = a.getBoundingClientRect();
    let r2 = b.getBoundingClientRect();
    return !(r1.top > r2.bottom || r1.bottom < r2.top || r1.right < r2.left || r1.left > r2.right);
}

function gameOver() {
    gameState.playing = false;
    gameState.totalDist += Math.floor(gameState.dist);
    save();
    alert("GAME OVER! Du fick " + Math.floor(gameState.dist) + " km.");
    location.reload();
}

function save() {
    localStorage.setItem('money', gameState.money);
    localStorage.setItem('totalDist', gameState.totalDist);
    localStorage.setItem('ownedCars', JSON.stringify(gameState.ownedCars));
    localStorage.setItem('currentCar', gameState.currentCar);
    localStorage.setItem('currentTrack', gameState.currentTrack);
}

function applySettings() {
    const car = carsData[gameState.currentCar];
    player.style.background = car.color;
    player.style.boxShadow = `0 0 20px ${car.neon}`;
    const track = tracksData[gameState.currentTrack];
    document.documentElement.style.setProperty('--road-color', track.road);
    document.documentElement.style.setProperty('--track-border', track.border);
}

// Kör vid start
applySettings();
</script>
</body>
</html>
