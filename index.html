<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nitro Rush - Top Down Racing (Fixed Edition)</title>
    <style>
        body { margin: 0; padding: 0; background-color: #333; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; }
        
        #main-menu { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(45deg, #1a1a1a, #4a4a4a); color: white; text-align: center; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; }
        #main-menu h1 { font-size: 60px; margin-bottom: 20px; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        .menu-btn { padding: 15px 40px; font-size: 22px; margin: 10px; cursor: pointer; background-color: #e74c3c; color: white; border: none; border-radius: 5px; transition: transform 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .menu-btn:hover { transform: scale(1.1); background-color: #c0392b; }
        .menu-btn:disabled { background-color: #7f8c8d; cursor: not-allowed; transform: none; }
        
        #game-area { width: 400px; height: 100vh; position: relative; margin: 0 auto; background-color: #555; overflow: hidden; border-left: 10px solid gold; border-right: 10px solid gold; box-sizing: border-box; }
        
        .road { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .lane-markings { position: absolute; width: 10px; height: 80px; background-color: white; left: calc(50% - 5px); }

        #player-car { width: 50px; height: 90px; position: absolute; border: 2px solid white; border-radius: 5px; box-shadow: 0 4px 8px rgba(0,0,0,0.5); z-index: 50; transition: transform 0.1s; }
        
        /* Olje-sladd effekt */
        .oil-skid { animation: skid 0.2s infinite; border-color: black !important; }
        @keyframes skid { 0% { transform: rotate(-5deg); } 50% { transform: rotate(5deg); } 100% { transform: rotate(-5deg); } }

        .obstacle-car { width: 50px; height: 90px; position: absolute; z-index: 40; border-radius: 5px; box-shadow: 0 4px 8px rgba(0,0,0,0.5); border: 2px solid #ccc; }
        .police-car { width: 50px; height: 90px; position: absolute; background-color: red; border: 4px solid blue; animation: flash-police 0.5s infinite; border-radius: 5px; box-shadow: 0 4px 8px rgba(0,0,0,0.5); z-index: 60; }
        .oil-slick { width: 70px; height: 50px; background: rgba(0,0,0,0.7); position: absolute; border-radius: 50%; z-index: 30; }

        @keyframes flash-police { 0% { border-color: red; } 50% { border-color: blue; } 100% { border-color: red; } }

        #score-display { position: fixed; top: 20px; left: 20px; color: white; font-size: 24px; font-weight: bold; }
        #nitro-display { position: fixed; top: 60px; left: 20px; color: gold; font-size: 20px; font-weight: bold; text-shadow: 0 0 5px gold; opacity: 0.2; }
        #nitro-display.ready { opacity: 1; animation: pulse-nitro 1s infinite; }
        #nitro-bar-container { width: 200px; height: 10px; background-color: #333; margin-top: 10px; border: 2px solid #ccc; }
        #nitro-bar { height: 100%; width: 0%; background-color: gold; transition: width 0.1s linear; }
        @keyframes pulse-nitro { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        #money-display { position: fixed; top: 120px; left: 20px; color: lightgreen; font-size: 24px; font-weight: bold; text-shadow: 1px 1px 2px black; }

        #message-display { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; color: white; display: none; z-index: 100; font-size: 30px; font-weight: bold; background: rgba(0,0,0,0.8); padding: 40px; border-radius: 20px; }
        #restart-btn { margin-top: 20px; }

        #traffic-light-container { position: fixed; top: 20px; right: 20px; width: 50px; height: 130px; background-color: #333; border: 4px solid #1a1a1a; display: none; flex-direction: column; justify-content: space-around; align-items: center; padding: 10px; z-index: 90; }
        .light { width: 30px; height: 30px; border-radius: 50%; background-color: #555; }
        .light.green { background-color: #2ecc71; box-shadow: 0 0 10px #2ecc71; }
        .light.yellow { background-color: #f1c40f; box-shadow: 0 0 10px #f1c40f; }
        .light.red { background-color: #e74c3c; box-shadow: 0 0 10px #e74c3c; }
    </style>
</head>
<body>

    <div id="main-menu">
        <h1>NITRO RUSH</h1>
        <p>Distans sammanlagt: <span id="total-dist-display">0</span> km</p>
        <p>Pengar: <span id="money-menu-display">0</span> kr</p>
        <button id="start-btn" class="menu-btn">STARTA RACE</button>
        <button id="garage-btn" class="menu-btn">GARAGE</button>
        <button id="tracks-btn" class="menu-btn">BYT BANA</button>
    </div>

    <div id="garage-menu" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); color: white; text-align: center; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 101;">
        <h2>GARAGE</h2>
        <p>Dina pengar: <span id="garage-money">0</span> kr</p>
        <div id="car-list" style="display: flex; gap: 20px; margin: 20px;"></div>
        <button id="back-from-garage" class="menu-btn">TILLBAKA</button>
    </div>

    <div id="tracks-menu" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); color: white; text-align: center; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 101;">
        <h2>VÄLJ BANA</h2>
        <p>Totalt körd sträcka: <span id="tracks-total-dist">0</span> km</p>
        <div style="display: flex; flex-direction: column; gap: 10px;">
            <button class="track-btn menu-btn" data-track="standard" data-req="0">Standard (0 km)</button>
            <button class="track-btn menu-btn" data-track="öken" data-req="1000" disabled>Öken (1000 km)</button>
            <button class="track-btn menu-btn" data-track="natt" data-req="5000" disabled>Natt (5000 km)</button>
            <button class="track-btn menu-btn" data-track="neon" data-req="10000" disabled>NeonCity (10000 km)</button>
        </div>
        <button id="back-from-tracks" class="menu-btn" style="margin-top: 20px;">TILLBAKA</button>
    </div>

    <div id="game-area" style="display: none;">
        <div id="road">
            <div id="lane-markings"></div>
        </div>
        <div id="player-car"></div>
    </div>

    <div id="score-display">Distans: 0m</div>
    <div id="nitro-display">
        NITRO: <span id="nitro-status">Redo! (Tryck N)</span>
        <div id="nitro-bar-container"><div id="nitro-bar"></div></div>
    </div>
    <div id="money-display">Pengar: 0 kr</div>

    <div id="message-display">
        GAME OVER!<br>
        Du körde <span id="end-score">0</span> meter och tjänade <span id="end-money">0</span> kr.
        <br>
        <button id="restart-btn" class="menu-btn">Spela Igen</button>
        <button id="menu-btn-end" class="menu-btn">Huvudmeny</button>
    </div>

    <div id="traffic-light-container">
        <div id="light-green" class="light"></div>
        <div id="light-yellow" class="light"></div>
        <div id="light-red" class="light"></div>
    </div>

    <script>
        // --- ALL KONFIGURATION FRÅN ORIGINALET ---
        const ROAD_WIDTH = 400;
        const CAR_WIDTH = 50;
        const CAR_HEIGHT = 90;
        const GAME_SPEED_BASE = 8;
        const NITRO_SPEED_MULTIPLIER = 1.8;
        const LANE_MARKING_SPEED = 1.2;
        const MIN_CAR_SPAWN_INTERVAL = 1500;
        const MAX_CAR_SPAWN_INTERVAL = 4000;
        const NITRO_RECHARGE_TIME = 10000;
        const NITRO_DURATION = 4000;
        const TRAFFIC_LIGHT_MIN_INTERVAL = 20000;
        const TRAFFIC_LIGHT_MAX_INTERVAL = 40000;
        const MONEY_PER_CAR = 10;

        let player = {
            element: document.getElementById('player-car'),
            x: (ROAD_WIDTH / 2) - (CAR_WIDTH / 2),
            y: 0,
            speed: 0,
            originalSpeed: 0,
            nitroActive: false,
            nitroReady: true,
            distance: 0,
            money: 0,
            activeCarIndex: 0,
            sliding: false
        };

        // Persistent data
        let totalDistance = parseInt(localStorage.getItem('totalDistance')) || 0;
        let persistentMoney = parseInt(localStorage.getItem('persistentMoney')) || 0;
        let ownedCars = JSON.parse(localStorage.getItem('ownedCars')) || [0];
        player.activeCarIndex = parseInt(localStorage.getItem('activeCarIndex')) || 0;

        const CAR_DB = [
            { name: "Rookie", cost: 0, speed: 0.10, color: "blue" },
            { name: "Sportster", cost: 200, speed: 0.12, color: "lime" },
            { name: "TurboX", cost: 500, speed: 0.14, color: "cyan" },
            { name: "Formula-X", cost: 1000, speed: 0.16, color: "yellow" }
        ];

        const TRACK_DB = {
            standard: { bgColor: "#555", borderColor: "gold", name: "Standard" },
            öken: { bgColor: "#edc9af", borderColor: "#f4a460", name: "Öken" },
            natt: { bgColor: "#222", borderColor: "#555", name: "Natt" },
            neon: { bgColor: "#111", borderColor: "#ff00ff", name: "NeonCity" }
        };

        let currentTrack = localStorage.getItem('currentTrack') || "standard";
        let isGameRunning = false;
        let keys = {};
        let obstacles = [];
        let laneMarkingsList = [];
        let gameLoopId, carSpawnTimer, nitroRechargeTimer, trafficLightSequenceTimer;
        let policeCars = [];

        function init() {
            window.addEventListener('keydown', e => keys[e.code] = true);
            window.addEventListener('keyup', e => keys[e.code] = false);
            window.addEventListener('keydown', e => { if (e.code === 'KeyN') tryActivateNitro(); });

            applyTrack(currentTrack);
            document.getElementById('start-btn').onclick = startGame;
            document.getElementById('garage-btn').onclick = showGarage;
            document.getElementById('tracks-btn').onclick = showTracks;
            document.getElementById('restart-btn').onclick = startGame;
            document.getElementById('menu-btn-end').onclick = showMainMenu;
            document.getElementById('back-from-garage').onclick = backFromGarage;
            document.getElementById('back-from-tracks').onclick = backFromTracks;

            updateMenuDisplays();
        }

        function updateMenuDisplays() {
            document.getElementById('total-dist-display').innerText = totalDistance;
            document.getElementById('money-menu-display').innerText = persistentMoney;
            document.getElementById('garage-money').innerText = persistentMoney;
            document.getElementById('tracks-total-dist').innerText = totalDistance;
        }

        function applyTrack(trackKey) {
            const track = TRACK_DB[trackKey];
            document.getElementById('game-area').style.backgroundColor = track.bgColor;
            document.getElementById('game-area').style.borderColor = track.borderColor;
            currentTrack = trackKey;
            localStorage.setItem('currentTrack', currentTrack);
        }

        function startGame() {
            if (isGameRunning) return;
            isGameRunning = true;
            player.x = (ROAD_WIDTH / 2) - (CAR_WIDTH / 2);
            player.distance = 0; player.money = 0; player.nitroReady = true; player.nitroActive = false;
            player.originalSpeed = GAME_SPEED_BASE + CAR_DB[player.activeCarIndex].speed * GAME_SPEED_BASE;
            player.speed = player.originalSpeed;
            player.element.style.backgroundColor = CAR_DB[player.activeCarIndex].color;

            obstacles.forEach(ob => ob.element.remove()); obstacles = [];
            policeCars.forEach(pc => pc.element.remove()); policeCars = [];
            document.getElementById('lane-markings').innerHTML = '';
            laneMarkingsList = [];
            createLaneMarkings();

            document.getElementById('message-display').style.display = 'none';
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById('game-area').style.display = 'block';
            
            updateInGameUI();
            gameLoop();
            spawnObstacles();
            scheduleTrafficLight();
        }

        function gameLoop() {
            if (!isGameRunning) return;

            // Rörelse
            if (!player.sliding) {
                if (keys['ArrowLeft'] || keys['KeyA']) player.x -= 7;
                if (keys['ArrowRight'] || keys['KeyD']) player.x += 7;
            } else {
                // Vid sladd rör sig bilen lite slumpmässigt
                player.x += (Math.random() - 0.5) * 10;
            }

            if (player.x < 0) player.x = 0;
            if (player.x > ROAD_WIDTH - CAR_WIDTH) player.x = ROAD_WIDTH - CAR_WIDTH;
            player.element.style.left = player.x + 'px';
            player.element.style.bottom = '20px';

            // Lane markings
            laneMarkingsList.forEach(marking => {
                marking.y += player.speed * LANE_MARKING_SPEED;
                if (marking.y >= 1000) marking.y -= 1160;
                marking.element.style.top = marking.y + 'px';
            });

            // Obstacles
            for (let i = obstacles.length - 1; i >= 0; i--) {
                obstacles[i].y += player.speed * 0.8;
                obstacles[i].element.style.top = obstacles[i].y + 'px';

                if (isColliding(player, obstacles[i])) {
                    if (obstacles[i].type === 'oil') {
                        triggerOilSkid(i);
                    } else {
                        endGame(); return;
                    }
                }

                if (!obstacles[i].passed && obstacles[i].y > 500) {
                    obstacles[i].passed = true;
                    player.money += MONEY_PER_CAR;
                    updateInGameUI();
                }

                if (obstacles[i].y > 1000) {
                    obstacles[i].element.remove();
                    obstacles.splice(i, 1);
                }
            }

            // Polisen (Rättvis spawn)
            for (let i = policeCars.length - 1; i >= 0; i--) {
                policeCars[i].y -= player.speed * 1.2;
                policeCars[i].element.style.top = policeCars[i].y + 'px';
                if (isColliding(player, policeCars[i])) { endGame(); return; }
                if (policeCars[i].y < -200) { policeCars[i].element.remove(); policeCars.splice(i, 1); }
            }

            player.distance += player.speed / 20;
            scoreDisplay.innerText = `Distans: ${Math.floor(player.distance)}m`;
            gameLoopId = requestAnimationFrame(gameLoop);
        }

        function spawnObstacles() {
            if (!isGameRunning) return;
            const type = Math.random() > 0.15 ? 'car' : 'oil';
            const obstacle = document.createElement('div');
            const lanes = [(ROAD_WIDTH/4)-25, (ROAD_WIDTH*0.75)-25];
            const lane = lanes[Math.floor(Math.random()*2)];

            if (type === 'car') {
                obstacle.className = 'obstacle-car';
                obstacle.style.backgroundColor = `hsl(${Math.random()*360}, 60%, 60%)`;
                obstacle.style.width = '50px'; obstacle.style.height = '90px';
            } else {
                obstacle.className = 'oil-slick';
                obstacle.style.width = '70px'; obstacle.style.height = '50px';
            }
            
            obstacle.style.left = lane + 'px';
            obstacle.style.top = '-200px';
            document.getElementById('road').appendChild(obstacle);
            obstacles.push({ element: obstacle, x: lane, y: -200, passed: false, type: type });
            
            carSpawnTimer = setTimeout(spawnObstacles, randomInt(MIN_CAR_SPAWN_INTERVAL, MAX_CAR_SPAWN_INTERVAL));
        }

        function triggerOilSkid(index) {
            if (player.sliding) return;
            player.sliding = true;
            player.element.classList.add('oil-skid');
            obstacles[index].element.remove();
            obstacles.splice(index, 1);
            setTimeout(() => {
                player.sliding = false;
                player.element.classList.remove('oil-skid');
            }, 2000);
        }

        function scheduleTrafficLight() {
            trafficLightSequenceTimer = setTimeout(() => {
                const container = document.getElementById('traffic-light-container');
                container.style.display = 'flex';
                setLight('green');
                setTimeout(() => {
                    setLight('yellow');
                    setTimeout(() => {
                        setLight('red');
                        spawnPoliceCars();
                        setTimeout(() => {
                            container.style.display = 'none';
                            scheduleTrafficLight();
                        }, 5000);
                    }, 2000);
                }, 4000);
            }, randomInt(TRAFFIC_LIGHT_MIN_INTERVAL, TRAFFIC_LIGHT_MAX_INTERVAL));
        }

        function spawnPoliceCars() {
            const laneIdx = Math.random() > 0.5 ? 0 : 1;
            const lanes = [(ROAD_WIDTH/4)-25, (ROAD_WIDTH*0.75)-25];
            const police = document.createElement('div');
            police.className = 'police-car';
            police.style.left = lanes[laneIdx] + 'px';
            police.style.top = '100vh';
            document.getElementById('road').appendChild(police);
            policeCars.push({ element: police, x: lanes[laneIdx], y: window.innerHeight });
        }

        // --- ALL GARAGE OCH SCORE LOGIK BEVARAD ---
        function isColliding(p, o) {
            const pW = 50, pH = 90;
            const oW = o.type === 'oil' ? 70 : 50;
            const oH = o.type === 'oil' ? 50 : 90;
            return (p.x < o.x + oW && p.x + pW > o.x && window.innerHeight - pH - 20 < o.y + oH && window.innerHeight - 20 > o.y);
        }

        function setLight(color) {
            document.querySelectorAll('.light').forEach(l => l.className = 'light');
            document.getElementById('light-' + color).classList.add(color);
        }

        function endGame() {
            isGameRunning = false;
            totalDistance += Math.floor(player.distance / 1000);
            persistentMoney += player.money;
            localStorage.setItem('totalDistance', totalDistance);
            localStorage.setItem('persistentMoney', persistentMoney);
            document.getElementById('end-score').innerText = Math.floor(player.distance);
            document.getElementById('end-money').innerText = player.money;
            document.getElementById('message-display').style.display = 'block';
            cancelAnimationFrame(gameLoopId);
        }

        function showGarage() {
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById('garage-menu').style.display = 'flex';
            renderCarList();
        }

        function renderCarList() {
            const list = document.getElementById('car-list');
            list.innerHTML = '';
            CAR_DB.forEach((car, index) => {
                const card = document.createElement('div');
                card.style.cssText = `border: 2px solid ${car.color}; padding: 10px; border-radius: 5px; width: 120px; text-align: center;`;
                const isOwned = ownedCars.includes(index);
                card.innerHTML = `<p style="color:${car.color}">${car.name}</p><p>${car.cost} kr</p>`;
                const btn = document.createElement('button');
                btn.innerText = player.activeCarIndex === index ? "VALD" : (isOwned ? "VÄLJ" : "KÖP");
                btn.onclick = () => {
                    if (isOwned) {
                        player.activeCarIndex = index; localStorage.setItem('activeCarIndex', index);
                    } else if (persistentMoney >= car.cost) {
                        persistentMoney -= car.cost; ownedCars.push(index);
                        localStorage.setItem('persistentMoney', persistentMoney);
                        localStorage.setItem('ownedCars', JSON.stringify(ownedCars));
                    }
                    renderCarList(); updateMenuDisplays();
                };
                card.appendChild(btn); list.appendChild(card);
            });
        }

        function showTracks() {
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById('tracks-menu').style.display = 'flex';
            document.querySelectorAll('.track-btn').forEach(btn => {
                const req = parseInt(btn.dataset.req);
                btn.disabled = totalDistance < req;
                btn.onclick = () => { applyTrack(btn.dataset.track); backFromTracks(); };
            });
        }

        function createLaneMarkings() {
            for(let i=0; i<10; i++) {
                const m = document.createElement('div'); m.className = 'lane-markings';
                m.style.top = (i * 160) + 'px';
                document.getElementById('lane-markings').appendChild(m);
                laneMarkingsList.push({ element: m, y: i * 160 });
            }
        }

        function tryActivateNitro() {
            if (isGameRunning && player.nitroReady && !player.nitroActive) {
                player.nitroActive = true; player.nitroReady = false;
                player.speed = player.originalSpeed * NITRO_SPEED_MULTIPLIER;
                document.getElementById('nitro-status').innerText = "AKTIV!";
                setTimeout(() => {
                    player.nitroActive = false; player.speed = player.originalSpeed;
                    document.getElementById('nitro-status').innerText = "Laddar...";
                    let p = 0;
                    let recharge = setInterval(() => {
                        p += 2; document.getElementById('nitro-bar').style.width = p + "%";
                        if (p >= 100) { clearInterval(recharge); player.nitroReady = true; document.getElementById('nitro-status').innerText = "Redo! [N]"; }
                    }, 200);
                }, NITRO_DURATION);
            }
        }

        function backFromGarage() { document.getElementById('garage-menu').style.display = 'none'; document.getElementById('main-menu').style.display = 'flex'; }
        function backFromTracks() { document.getElementById('tracks-menu').style.display = 'none'; document.getElementById('main-menu').style.display = 'flex'; }
        function showMainMenu() { location.reload(); }
        function randomInt(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
        function updateInGameUI() { document.getElementById('money-display').innerText = `Pengar: ${player.money} kr`; }

        init();
    </script>
</body>
</html>
