<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Turbo Racer</title>
    <style>
        :root {
            --neon-blue: #00f3ff;
            --neon-pink: #ff00ff;
            --road-grey: #333;
        }

        body {
            margin: 0;
            padding: 0;
            background: #111;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #game-container {
            position: relative;
            width: 400px;
            height: 600px;
            background: var(--road-grey);
            border: 4px solid #444;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        .screen {
            position: absolute;
            width: 100%;
            height: 100%;
            background: rgba(20, 20, 20, 0.95);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        .active { display: flex; }

        canvas { display: block; background: #333; }

        /* UI Element */
        .btn {
            background: transparent;
            color: var(--neon-blue);
            border: 2px solid var(--neon-blue);
            padding: 10px 20px;
            margin: 10px;
            cursor: pointer;
            font-size: 18px;
            width: 200px;
            transition: 0.3s;
            text-transform: uppercase;
            font-weight: bold;
        }

        .btn:hover {
            background: var(--neon-blue);
            color: #000;
            box-shadow: 0 0 15px var(--neon-blue);
        }

        #hud {
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 5;
            pointer-events: none;
        }

        .stat-box {
            background: rgba(0,0,0,0.6);
            padding: 5px 10px;
            margin-bottom: 5px;
            border-left: 3px solid var(--neon-pink);
        }

        /* Garage & Track Selector */
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            padding: 20px;
        }

        .item-card {
            border: 1px solid #555;
            padding: 10px;
            text-align: center;
            background: #222;
        }

        .locked { opacity: 0.5; filter: grayscale(1); }

        /* Traffic Light */
        #traffic-light {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 30px;
            height: 80px;
            background: #000;
            border-radius: 5px;
            display: none;
            flex-direction: column;
            justify-content: space-around;
            align-items: center;
            padding: 5px 0;
        }

        .light { width: 20px; height: 20px; border-radius: 50%; background: #222; }
        .red { background: #ff0000; box-shadow: 0 0 10px #ff0000; }
        .yellow { background: #ffcc00; box-shadow: 0 0 10px #ffcc00; }
        .green { background: #00ff00; box-shadow: 0 0 10px #00ff00; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="hud">
        <div class="stat-box">Pengar: <span id="money-display">0</span> kr</div>
        <div class="stat-box">Distans: <span id="dist-display">0</span> m</div>
        <div class="stat-box" id="nitro-status">Nitro: REDO</div>
    </div>

    <div id="traffic-light">
        <div id="light-red" class="light"></div>
        <div id="light-yellow" class="light"></div>
        <div id="light-green" class="light"></div>
    </div>

    <div id="main-menu" class="screen active">
        <h1 style="color: var(--neon-blue)">TURBO RACER</h1>
        <button class="btn" onclick="startGame()">Starta Race</button>
        <button class="btn" onclick="openGarage()">Garage</button>
        <button class="btn" onclick="openTracks()">Byt Track</button>
    </div>

    <div id="garage-screen" class="screen">
        <h2>Garage</h2>
        <div class="grid" id="car-list"></div>
        <button class="btn" onclick="showScreen('main-menu')">Tillbaka</button>
    </div>

    <div id="track-screen" class="screen">
        <h2>Välj Bana</h2>
        <p>Total distans: <span id="total-dist-display">0</span> km</p>
        <div class="grid" id="track-list"></div>
        <button class="btn" onclick="showScreen('main-menu')">Tillbaka</button>
    </div>

    <div id="game-over" class="screen">
        <h1 style="color: red;">CRASH!</h1>
        <p id="final-stats"></p>
        <button class="btn" onclick="showScreen('main-menu')">Huvudmeny</button>
    </div>

    <canvas id="gameCanvas" width="400" height="600"></canvas>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // --- GAME STATE & STORAGE ---
    let gameState = {
        money: parseInt(localStorage.getItem('money')) || 0,
        totalDist: parseFloat(localStorage.getItem('totalDist')) || 0,
        unlockedCars: JSON.parse(localStorage.getItem('unlockedCars')) || [0],
        currentCar: parseInt(localStorage.getItem('currentCar')) || 0,
        unlockedTracks: JSON.parse(localStorage.getItem('unlockedTracks')) || [0],
        currentTrack: parseInt(localStorage.getItem('currentTrack')) || 0
    };

    function saveGame() {
        localStorage.setItem('money', gameState.money);
        localStorage.setItem('totalDist', gameState.totalDist);
        localStorage.setItem('unlockedCars', JSON.stringify(gameState.unlockedCars));
        localStorage.setItem('currentCar', gameState.currentCar);
        localStorage.setItem('unlockedTracks', JSON.stringify(gameState.unlockedTracks));
        localStorage.setItem('currentTrack', gameState.currentTrack);
    }

    // --- DATA ---
    const cars = [
        { name: "Bas", color: "#33ff57", price: 0, speed: 1 },
        { name: "Sport", color: "#3357ff", price: 500, speed: 1.2 },
        { name: "Racer", color: "#f3ff33", price: 1500, speed: 1.5 },
        { name: "Super", color: "#ff33f3", price: 5000, speed: 2 },
        { name: "Hyper", color: "#00f3ff", price: 10000, speed: 2.5 }
    ];

    const tracks = [
        { name: "Stad", color: "#333", req: 0, line: "#fff" },
        { name: "Öken", color: "#edc9af", req: 1, line: "#c2b280" },
        { name: "Skog", color: "#2d5a27", req: 5, line: "#1e391b" },
        { name: "Natt", color: "#000022", req: 10, line: "#3333ff" },
        { name: "Mars", color: "#8b0000", req: 25, line: "#ff4500" }
    ];

    const enemyColors = ["#ff0000", "#ff8800", "#ffffff", "#888888", "#440044"];

    // --- GAME VARIABLES ---
    let running = false;
    let score = 0;
    let distance = 0;
    let speed = 5;
    let nitroReady = true;
    let isNitro = false;
    let isSlipping = false;
    let trafficPhase = 'green'; // green, yellow, red

    let player = { x: 175, y: 500, w: 40, h: 70 };
    let enemies = [];
    let oilSpills = [];
    let roadLines = [];

    // --- INPUT ---
    let keys = {};
    window.addEventListener('keydown', e => { 
        keys[e.code] = true; 
        if(e.code === 'Space' && nitroReady) activateNitro();
    });
    window.addEventListener('keyup', e => keys[e.code] = false);

    // --- FUNCTIONS ---
    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'main-menu') running = false;
    }

    function openGarage() {
        showScreen('garage-screen');
        const list = document.getElementById('car-list');
        list.innerHTML = '';
        cars.forEach((car, index) => {
            const isUnlocked = gameState.unlockedCars.includes(index);
            list.innerHTML += `
                <div class="item-card ${isUnlocked ? '' : 'locked'}">
                    <div style="background:${car.color}; width:30px; height:50px; margin:auto"></div>
                    <p>${car.name}</p>
                    ${isUnlocked ? 
                        `<button class="btn" style="width:100px" onclick="selectCar(${index})">${gameState.currentCar === index ? 'Vald' : 'Välj'}</button>` :
                        `<button class="btn" style="width:100px" onclick="buyCar(${index})">${car.price}kr</button>`
                    }
                </div>
            `;
        });
    }

    function buyCar(index) {
        if(gameState.money >= cars[index].price) {
            gameState.money -= cars[index].price;
            gameState.unlockedCars.push(index);
            saveGame();
            openGarage();
        }
    }

    function selectCar(index) {
        gameState.currentCar = index;
        saveGame();
        openGarage();
    }

    function openTracks() {
        showScreen('track-screen');
        document.getElementById('total-dist-display').innerText = (gameState.totalDist / 1000).toFixed(1);
        const list = document.getElementById('track-list');
        list.innerHTML = '';
        tracks.forEach((track, index) => {
            const isUnlocked = (gameState.totalDist / 1000) >= track.req;
            list.innerHTML += `
                <div class="item-card ${isUnlocked ? '' : 'locked'}">
                    <p>${track.name}</p>
                    <small>${track.req}km krav</small><br>
                    ${isUnlocked ? 
                        `<button class="btn" style="width:100px" onclick="selectTrack(${index})">${gameState.currentTrack === index ? 'Vald' : 'Välj'}</button>` :
                        `Låst`
                    }
                </div>
            `;
        });
    }

    function selectTrack(index) {
        gameState.currentTrack = index;
        saveGame();
        openTracks();
    }

    // --- CORE GAME ENGINE ---
    function startGame() {
        showScreen('none');
        running = true;
        score = 0;
        distance = 0;
        speed = 5;
        enemies = [];
        oilSpills = [];
        roadLines = [];
        for(let i=0; i<5; i++) roadLines.push(i*150);
        
        // Timers
        setInterval(() => { if(running) nitroReady = true; }, 10000);
        setInterval(() => { if(running) toggleTraffic(); }, 35000);
        
        requestAnimationFrame(gameLoop);
    }

    function activateNitro() {
        isNitro = true;
        nitroReady = false;
        speed *= 2;
        document.getElementById('nitro-status').innerText = "AKTIV!";
        setTimeout(() => {
            isNitro = false;
            speed /= 2;
            document.getElementById('nitro-status').innerText = "Laddar...";
        }, 4000);
    }

    function toggleTraffic() {
        const light = document.getElementById('traffic-light');
        light.style.display = 'flex';
        
        // Gul fas
        setLight('yellow');
        setTimeout(() => {
            setLight('red');
            trafficPhase = 'red';
            // Spawn extra bilar (Polis-våg)
            setTimeout(() => {
                trafficPhase = 'green';
                setLight('green');
                setTimeout(() => light.style.display = 'none', 2000);
            }, 10000);
        }, 2000);
    }

    function setLight(color) {
        document.getElementById('light-red').className = 'light' + (color==='red'?' red':'');
        document.getElementById('light-yellow').className = 'light' + (color==='yellow'?' yellow':'');
        document.getElementById('light-green').className = 'light' + (color==='green'?' green':'');
    }

    function gameLoop() {
        if(!running) return;
        update();
        draw();
        requestAnimationFrame(gameLoop);
    }

    function update() {
        // Svårighetsgrad
        if(Math.floor(distance) % 50 === 0 && distance > 0) speed += 0.01;

        // Kontroller
        let moveSpeed = 5 * cars[gameState.currentCar].speed;
        if(isSlipping) moveSpeed = -2; // Tappa balansen

        if(keys['ArrowLeft'] && player.x > 0) player.x -= moveSpeed;
        if(keys['ArrowRight'] && player.x < canvas.width - player.w) player.x += moveSpeed;

        // Väglinjer
        roadLines = roadLines.map(y => (y + speed) % 600);

        // Spawn Enemies
        if(Math.random() < (trafficPhase === 'red' ? 0.08 : 0.03)) {
            enemies.push({
                x: Math.random() * (canvas.width - 40),
                y: -100,
                w: 40,
                h: 70,
                color: trafficPhase === 'red' ? '#0000ff' : enemyColors[Math.floor(Math.random()*5)],
                passed: false
            });
        }

        // Spawn Oil
        if(Math.random() < 0.005) {
            oilSpills.push({ x: Math.random() * 350, y: -50, w: 40, h: 40 });
        }

        // Update Entities
        enemies.forEach((en, i) => {
            en.y += speed * 0.8;
            // Kolla kollision
            if(player.x < en.x + en.w && player.x + player.w > en.x && player.y < en.y + en.h && player.y + player.h > en.y) {
                gameOver();
            }
            // Poäng när man passerar
            if(!en.passed && en.y > player.y + player.h) {
                gameState.money += 10;
                en.passed = true;
            }
        });

        oilSpills.forEach((oil, i) => {
            oil.y += speed;
            if(player.x < oil.x + oil.w && player.x + player.w > oil.x && player.y < oil.y + oil.h && player.y + player.h > oil.y) {
                if(!isSlipping) {
                    isSlipping = true;
                    setTimeout(() => isSlipping = false, 1000);
                }
            }
        });

        // Clean up
        enemies = enemies.filter(en => en.y < 700);
        oilSpills = oilSpills.filter(o => o.y < 700);

        distance += speed / 100;
        
        // Update HUD
        document.getElementById('money-display').innerText = gameState.money;
        document.getElementById('dist-display').innerText = Math.floor(distance);
        if(nitroReady) document.getElementById('nitro-status').innerText = "Nitro: REDO";
    }

    function draw() {
        const track = tracks[gameState.currentTrack];
        ctx.fillStyle = track.color;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Väglinjer
        ctx.strokeStyle = track.line;
        ctx.setLineDash([40, 40]);
        ctx.lineWidth = 5;
        ctx.beginPath();
        ctx.moveTo(canvas.width/2, 0);
        ctx.lineTo(canvas.width/2, canvas.height);
        ctx.stroke();

        // Oil
        ctx.fillStyle = "rgba(0,0,0,0.8)";
        oilSpills.forEach(o => ctx.fillRect(o.x, o.y, o.w, o.h));

        // Enemies
        enemies.forEach(en => {
            ctx.fillStyle = en.color;
            ctx.fillRect(en.x, en.y, en.w, en.h);
            // Polis-ljus om röd fas
            if(en.color === '#0000ff') {
                ctx.fillStyle = Math.random() > 0.5 ? 'red' : 'blue';
                ctx.fillRect(en.x, en.y, 10, 10);
            }
        });

        // Player
        ctx.fillStyle = cars[gameState.currentCar].color;
        if(isNitro) ctx.shadowBlur = 20, ctx.shadowColor = "cyan";
        ctx.fillRect(player.x, player.y, player.w, player.h);
        ctx.shadowBlur = 0;
    }

    function gameOver() {
        running = false;
        gameState.totalDist += distance;
        saveGame();
        document.getElementById('final-stats').innerText = `Du körde ${Math.floor(distance)} meter och tjänade pengar!`;
        showScreen('game-over');
    }

    // Init
    saveGame(); // Spara initialt om det är första gången
</script>

</body>
</html>
