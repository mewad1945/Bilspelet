<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <title>Neon Racer - Garage & Prestige</title>
    <style>
        :root { --p: #00ff41; --s: #ff0055; --neon: #00d4ff; --gold: #f1c40f; }
        body { margin: 0; background: #050505; color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; display: flex; justify-content: center; }
        
        /* --- SPELYTA --- */
        #game-wrap { position: relative; width: 450px; height: 100vh; background: #151515; border-left: 4px solid #333; border-right: 4px solid #333; overflow: hidden; }
        #canvas { display: block; background: #111; }

        /* --- MENYER --- */
        .menu-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; text-align: center; }
        .btn { padding: 15px 40px; margin: 10px; background: var(--s); border: none; color: white; font-weight: bold; cursor: pointer; border-radius: 5px; font-size: 20px; transition: 0.2s; }
        .btn:hover { transform: scale(1.1); background: var(--p); color: black; }
        
        /* --- GARAGE --- */
        #garage-ui { display: none; }
        .car-shop-item { background: #222; padding: 15px; margin: 10px; border-radius: 10px; border: 2px solid #444; width: 250px; display: flex; justify-content: space-between; align-items: center; }
        .car-shop-item.owned { border-color: var(--p); }

        /* --- HUD --- */
        #hud { position: absolute; top: 20px; left: 20px; pointer-events: none; z-index: 50; }
        .stat { font-size: 24px; font-weight: bold; color: var(--p); text-shadow: 2px 2px 5px black; }
        #boost-bar-wrap { width: 200px; height: 10px; background: #333; margin-top: 10px; border-radius: 5px; overflow: hidden; }
        #boost-bar { width: 0%; height: 100%; background: var(--neon); transition: 0.1s; box-shadow: 0 0 10px var(--neon); }

        /* --- LEADERBOARD --- */
        #leaderboard { position: absolute; bottom: 20px; width: 100%; text-align: center; font-size: 14px; color: #888; }
    </style>
</head>
<body>

<div id="game-wrap">
    <!-- HUD -->
    <div id="hud">
        <div class="stat">💰 $<span id="money-display">0</span></div>
        <div class="stat" style="color:var(--gold)">🏆 <span id="dist-display">0</span> km</div>
        <div id="boost-bar-wrap"><div id="boost-bar"></div></div>
        <div id="boost-text" style="font-size:12px; color:var(--neon)">NEON BOOST (SPACE)</div>
    </div>

    <!-- START MENY -->
    <div id="start-menu" class="menu-overlay">
        <h1 style="color:var(--neon); font-size: 40px;">NEON RACER</h1>
        <button class="btn" onclick="startGame()">STARTA RACET</button>
        <button class="btn" style="background:var(--purp)" onclick="showGarage()">GARAGE</button>
    </div>

    <!-- GARAGE MENY -->
    <div id="garage-ui" class="menu-overlay">
        <h2 style="color:var(--purp)">VÄLJ DIN BIL</h2>
        <div id="car-list"></div>
        <button class="btn" style="background:#444" onclick="hideGarage()">TILLBAKA</button>
    </div>

    <canvas id="canvas"></canvas>

    <div id="leaderboard">
        <b>TOP DISTANS:</b> <span id="high-score">0</span> km
    </div>
</div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = 450;
    canvas.height = window.innerHeight;

    // --- GAME STATE ---
    let money = parseInt(localStorage.getItem('car_money')) || 0;
    let distance = 0;
    let highScore = parseInt(localStorage.getItem('car_highscore')) || 0;
    let gameActive = false;
    let speed = 5;
    let boostCharge = 0;
    let isBoosting = false;
    let playerX = 200;
    let currentCarIndex = parseInt(localStorage.getItem('current_car')) || 0;
    let ownedCars = JSON.parse(localStorage.getItem('owned_cars')) || [0];

    const carModels = [
        { name: "Standard", price: 0, color: "#3498db", speed: 5, emoji: "🏎️" },
        { name: "Sport", price: 1000, color: "#f1c40f", speed: 7, emoji: "🏎️" },
        { name: "Super", price: 5000, color: "#e74c3c", speed: 9, emoji: "🏎️" },
        { name: "Neon God", price: 20000, color: "#00ff41", speed: 12, emoji: "🏎️" }
    ];

    let enemies = [];
    let oilSlicks = [];
    let roadY = 0;

    // --- BIL-MODELLER (Top Down) ---
    function drawCar(x, y, color, isPlayer = false) {
        ctx.save();
        ctx.translate(x, y);
        
        // Neon-glöd om det är spelaren och boostar
        if(isPlayer && isBoosting) {
            ctx.shadowBlur = 20;
            ctx.shadowColor = "cyan";
        }

        // Kaross
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.roundRect(-20, -40, 40, 80, 10);
        ctx.fill();
        ctx.strokeStyle = "black";
        ctx.stroke();

        // Fönster
        ctx.fillStyle = "#add8e6";
        ctx.fillRect(-15, -15, 30, 20); // Framrutan
        ctx.fillRect(-15, 15, 30, 10);  // Bakrutan

        // Hjul
        ctx.fillStyle = "#333";
        ctx.fillRect(-25, -30, 8, 20);
        ctx.fillRect(17, -30, 8, 20);
        ctx.fillRect(-25, 15, 8, 20);
        ctx.fillRect(17, 15, 8, 20);

        ctx.restore();
    }

    // --- LOGIK ---
    function startGame() {
        document.getElementById('start-menu').style.display = 'none';
        gameActive = true;
        distance = 0;
        speed = carModels[currentCarIndex].speed;
        enemies = [];
        oilSlicks = [];
        animate();
    }

    function showGarage() {
        document.getElementById('start-menu').style.display = 'none';
        document.getElementById('garage-ui').style.display = 'flex';
        renderCarList();
    }

    function hideGarage() {
        document.getElementById('garage-ui').style.display = 'none';
        document.getElementById('start-menu').style.display = 'flex';
    }

    function renderCarList() {
        const list = document.getElementById('car-list');
        list.innerHTML = `💰 Dina pengar: $${money}<br><br>`;
        carModels.forEach((car, i) => {
            const isOwned = ownedCars.includes(i);
            const item = document.createElement('div');
            item.className = `car-shop-item ${isOwned ? 'owned' : ''}`;
            item.innerHTML = `
                <span>${car.name}</span>
                <button onclick="${isOwned ? `selectCar(${i})` : `buyCar(${i})`}">
                    ${isOwned ? (currentCarIndex === i ? 'VALD' : 'VÄLJ') : '$' + car.price}
                </button>
            `;
            list.appendChild(item);
        });
    }

    function buyCar(i) {
        if(money >= carModels[i].price) {
            money -= carModels[i].price;
            ownedCars.push(i);
            localStorage.setItem('car_money', money);
            localStorage.setItem('owned_cars', JSON.stringify(ownedCars));
            renderCarList();
        } else { alert("För lite pengar!"); }
    }

    function selectCar(i) {
        currentCarIndex = i;
        localStorage.setItem('current_car', i);
        renderCarList();
    }

    // --- INPUT ---
    window.onkeydown = (e) => {
        if(e.key === "ArrowLeft" && playerX > 50) playerX -= 25;
        if(e.key === "ArrowRight" && playerX < 400) playerX += 25;
        if(e.code === "Space" && boostCharge >= 100) startBoost();
    };

    function startBoost() {
        isBoosting = true;
        boostCharge = 0;
        speed *= 2;
        setTimeout(() => {
            isBoosting = false;
            speed = carModels[currentCarIndex].speed;
        }, 5000);
    }

    // --- GAME LOOP ---
    function animate() {
        if(!gameActive) return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Vägen
        roadY += speed;
        if(roadY > 100) roadY = 0;
        ctx.strokeStyle = "white";
        ctx.setLineDash([40, 40]);
        ctx.beginPath();
        ctx.moveTo(canvas.width/2, -100 + roadY);
        ctx.lineTo(canvas.width/2, canvas.height + 100);
        ctx.stroke();

        // Olja
        if(Math.random() < 0.01) oilSlicks.push({x: Math.random()*350 + 50, y: -100});
        oilSlicks.forEach((oil, i) => {
            oil.y += speed;
            ctx.fillStyle = "rgba(0,0,0,0.8)";
            ctx.beginPath(); ctx.arc(oil.x, oil.y, 30, 0, Math.PI*2); ctx.fill();
            // Kollision
            if(Math.hypot(playerX - oil.x, (canvas.height-100) - oil.y) < 40) playerX += (Math.random()-0.5)*10;
        });

        // Fiender
        if(Math.random() < 0.02) enemies.push({x: Math.random()*350 + 50, y: -100, color: "blue", passed: false});
        enemies.forEach((en, i) => {
            en.y += speed * 0.7;
            drawCar(en.x, en.y, en.color);

            // Tjäna pengar när man kör förbi
            if(!en.passed && en.y > canvas.height-100) {
                money += 10;
                en.passed = true;
            }

            // Crash
            if(Math.abs(playerX - en.x) < 40 && Math.abs((canvas.height-100) - en.y) < 80) gameOver();
        });

        // Spelaren
        drawCar(playerX, canvas.height - 100, carModels[currentCarIndex].color, true);

        // UI Update
        distance += speed / 1000;
        if(!isBoosting && boostCharge < 100) boostCharge += 0.2;
        
        document.getElementById('money-display').innerText = money;
        document.getElementById('dist-display').innerText = distance.toFixed(1);
        document.getElementById('boost-bar').style.width = boostCharge + "%";

        requestAnimationFrame(animate);
    }

    function gameOver() {
        gameActive = false;
        if(distance > highScore) {
            highScore = distance;
            localStorage.setItem('car_highscore', Math.floor(highScore));
        }
        localStorage.setItem('car_money', money);
        alert("CRASH! Du körde " + distance.toFixed(1) + " km.");
        location.reload();
    }

    handlePlayerName(); // Använd namn från portalen
    document.getElementById('high-score').innerText = highScore;
</script>
</body>
</html>
