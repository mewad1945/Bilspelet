<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nitro Rush Pro - 10 Cars Edition</title>
    <style>
        body { margin: 0; padding: 0; background-color: #222; font-family: 'Arial Black', sans-serif; overflow: hidden; color: white; }
        
        /* Menyer */
        .menu-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
        .btn { padding: 15px 30px; margin: 10px; font-size: 20px; cursor: pointer; background: #e74c3c; color: white; border: none; border-radius: 10px; width: 250px; transition: 0.2s; }
        .btn:hover { transform: scale(1.1); background: #c0392b; }
        .btn:disabled { background: #555; cursor: not-allowed; }

        /* Spelyta */
        #game-area { width: 400px; height: 100vh; margin: 0 auto; position: relative; background: #444; border-left: 10px solid gold; border-right: 10px solid gold; overflow: hidden; display: none; }
        .lane-line { position: absolute; left: 50%; width: 6px; height: 100%; background: repeating-linear-gradient(to bottom, white 0, white 50px, transparent 50px, transparent 100px); transform: translateX(-50%); }

        /* Bilar & Objekt */
        #player { width: 50px; height: 85px; position: absolute; bottom: 50px; transition: left 0.2s ease-out; z-index: 10; border-radius: 5px; border: 2px solid white; }
        .enemy { width: 50px; height: 85px; position: absolute; z-index: 5; border-radius: 5px; }
        .police { width: 50px; height: 85px; position: absolute; background: red; border: 4px solid blue; animation: flash 0.2s infinite; z-index: 15; }
        @keyframes flash { 0% { background: red; } 50% { background: blue; } }
        .oil { width: 60px; height: 40px; background: rgba(0,0,0,0.8); position: absolute; border-radius: 50%; z-index: 2; }

        /* UI */
        #ui { position: fixed; top: 20px; left: 20px; font-size: 24px; z-index: 50; text-shadow: 2px 2px black; }
        #nitro-bar-wrap { width: 200px; height: 20px; background: #333; border: 2px solid white; margin-top: 10px; }
        #nitro-fill { height: 100%; width: 100%; background: gold; transition: width 0.1s; }
        
        /* Trafikljus */
        #traffic-light { position: fixed; top: 20px; right: 20px; width: 40px; height: 100px; background: #111; display: none; flex-direction: column; align-items: center; justify-content: space-around; padding: 5px; border-radius: 5px; }
        .light { width: 25px; height: 25px; border-radius: 50%; background: #333; }
        .active-green { background: #2ecc71; box-shadow: 0 0 15px #2ecc71; }
        .active-yellow { background: #f1c40f; box-shadow: 0 0 15px #f1c40f; }
        .active-red { background: #e74c3c; box-shadow: 0 0 15px #e74c3c; }
    </style>
</head>
<body>

    <div id="start-menu" class="menu-screen">
        <h1>NITRO RUSH <span style="color:gold">PRO</span></h1>
        <p>Total distans: <span id="stat-dist">0</span> km</p>
        <p>Pengar: <span id="stat-money">0</span> kr</p>
        <button class="btn" onclick="startGame()">STARTA RACE</button>
        <button class="btn" onclick="showMenu('garage-menu')">GARAGE</button>
        <button class="btn" onclick="showMenu('track-menu')">BYT BANA</button>
    </div>

    <div id="garage-menu" class="menu-screen" style="display:none">
        <h2>GARAGE</h2>
        <div id="car-list" style="display:flex; flex-wrap:wrap; justify-content:center; max-width:800px"></div>
        <button class="btn" onclick="showMenu('start-menu')">TILLBAKA</button>
    </div>

    <div id="track-menu" class="menu-screen" style="display:none">
        <h2>VÄLJ BANA</h2>
        <div id="track-list"></div>
        <button class="btn" onclick="showMenu('start-menu')">TILLBAKA</button>
    </div>

    <div id="death-menu" class="menu-screen" style="display:none">
        <h1 style="color:red">CRASH!</h1>
        <p id="death-stats"></p>
        <button class="btn" onclick="location.reload()">HUVUDMENY</button>
    </div>

    <div id="ui">
        Distans: <span id="ingame-dist">0</span> m<br>
        Pengar: <span id="ingame-money">0</span> kr
        <div id="nitro-bar-wrap"><div id="nitro-fill"></div></div>
        <small id="nitro-txt">NITRO REDO [SPACE]</small>
    </div>

    <div id="traffic-light">
        <div id="l-red" class="light"></div>
        <div id="l-yel" class="light"></div>
        <div id="l-grn" class="light"></div>
    </div>

    <div id="game-area">
        <div class="lane-line"></div>
        <div id="player"></div>
    </div>

<script>
    // --- DATABASER ---
    const CARS = [
        { name: "Sleeper", price: 0, speed: 8, color: "#3498db" },
        { name: "GT Rush", price: 500, speed: 10, color: "#2ecc71" },
        { name: "Viper", price: 1500, speed: 12, color: "#f1c40f" },
        { name: "Interceptor", price: 3000, speed: 14, color: "#9b59b6" },
        { name: "Carbon", price: 5000, speed: 16, color: "#34495e" },
        { name: "Neon Flux", price: 8000, speed: 18, color: "#ff00ff" },
        { name: "Apex", price: 12000, speed: 20, color: "#e67e22" },
        { name: "Ghost", price: 18000, speed: 22, color: "#ecf0f1" },
        { name: "Venom", price: 25000, speed: 25, color: "#c0392b" },
        { name: "Nitro King", price: 50000, speed: 30, color: "gold" }
    ];

    const TRACKS = [
        { name: "Staden", req: 0, color: "#444" },
        { name: "Öknen", req: 1000, color: "#d2b48c" },
        { name: "Nattklubben", req: 5000, color: "#1a1a2e" },
        { name: "Månen", req: 10000, color: "#222" },
        { name: "Helvetet", req: 20000, color: "#400" }
    ];

    const ENEMY_COLORS = ["#ff5555", "#55ff55", "#5555ff", "#ffff55", "#ff55ff", "#55ffff", "#ffffff", "#aaaaaa", "#ff8800", "#00ff88"];

    // --- STATE ---
    let storage = {
        money: parseInt(localStorage.getItem('nr_money')) || 0,
        totalDist: parseInt(localStorage.getItem('nr_totalDist')) || 0,
        owned: JSON.parse(localStorage.getItem('nr_owned')) || [0],
        activeCar: parseInt(localStorage.getItem('nr_activeCar')) || 0,
        activeTrack: parseInt(localStorage.getItem('nr_activeTrack')) || 0
    };

    let game = {
        running: false,
        dist: 0,
        money: 0,
        lane: 1, // 0 = vänster, 1 = höger
        speed: 0,
        baseSpeed: 0,
        oilFrozen: false,
        nitroReady: true,
        nitroActive: false,
        objects: []
    };

    // --- LOGIK ---
    function save() {
        localStorage.setItem('nr_money', storage.money);
        localStorage.setItem('nr_totalDist', storage.totalDist);
        localStorage.setItem('nr_owned', JSON.stringify(storage.owned));
        localStorage.setItem('nr_activeCar', storage.activeCar);
        localStorage.setItem('nr_activeTrack', storage.activeTrack);
    }

    function showMenu(id) {
        document.querySelectorAll('.menu-screen').forEach(m => m.style.display = 'none');
        document.getElementById(id).style.display = 'flex';
        if(id === 'garage-menu') renderGarage();
        if(id === 'track-menu') renderTracks();
        updateStats();
    }

    function updateStats() {
        document.getElementById('stat-dist').innerText = storage.totalDist;
        document.getElementById('stat-money').innerText = storage.money;
    }

    function renderGarage() {
        const container = document.getElementById('car-list');
        container.innerHTML = '';
        CARS.forEach((car, i) => {
            const isOwned = storage.owned.includes(i);
            const card = document.createElement('div');
            card.className = 'btn';
            card.style.background = isOwned ? (storage.activeCar == i ? 'gold' : '#27ae60') : '#e74c3c';
            card.style.width = '150px';
            card.innerHTML = `<b>${car.name}</b><br>${isOwned ? 'ÄGD' : car.price+' kr'}<br><small>Fart: ${car.speed}</small>`;
            card.onclick = () => {
                if(isOwned) {
                    storage.activeCar = i;
                } else if(storage.money >= car.price) {
                    storage.money -= car.price;
                    storage.owned.push(i);
                    storage.activeCar = i;
                }
                save(); renderGarage();
            };
            container.appendChild(card);
        });
    }

    function renderTracks() {
        const container = document.getElementById('track-list');
        container.innerHTML = '';
        TRACKS.forEach((t, i) => {
            const locked = storage.totalDist < t.req;
            const b = document.createElement('button');
            b.className = 'btn';
            b.disabled = locked;
            b.style.background = storage.activeTrack == i ? 'gold' : '';
            b.innerHTML = `${t.name}<br><small>${locked ? 'Kräver '+t.req+'km' : 'UPPLÅST'}</small>`;
            b.onclick = () => { storage.activeTrack = i; save(); renderTracks(); };
            container.appendChild(b);
        });
    }

    function startGame() {
        showMenu('none');
        document.getElementById('game-area').style.display = 'block';
        document.getElementById('game-area').style.background = TRACKS[storage.activeTrack].color;
        
        game.running = true;
        game.dist = 0;
        game.money = 0;
        game.baseSpeed = CARS[storage.activeCar].speed;
        game.speed = game.baseSpeed;
        
        const p = document.getElementById('player');
        p.style.background = CARS[storage.activeCar].color;
        
        spawnLoop();
        trafficLoop();
        tick();
    }

    function tick() {
        if(!game.running) return;

        // Öka svårighetsgrad (snabbare var 100:e meter)
        game.speed = (game.baseSpeed + (game.dist / 100)) * (game.nitroActive ? 1.8 : 1);
        game.dist += game.speed / 20;

        // Uppdatera UI
        document.getElementById('ingame-dist').innerText = Math.floor(game.dist);
        document.getElementById('ingame-money').innerText = game.money;

        // Spelarposition
        const p = document.getElementById('player');
        p.style.left = game.lane === 0 ? '75px' : '275px';

        // Flytta objekt
        game.objects.forEach((obj, i) => {
            obj.y += game.speed * 0.8;
            obj.el.style.top = obj.y + 'px';

            // Kollision
            const pRect = p.getBoundingClientRect();
            const oRect = obj.el.getBoundingClientRect();

            if (pRect.left < oRect.right && pRect.right > oRect.left && pRect.top < oRect.bottom && pRect.bottom > oRect.top) {
                if(obj.type === 'oil') {
                    triggerOil();
                    obj.el.remove(); game.objects.splice(i, 1);
                } else {
                    crash();
                }
            }

            // Passera bil (Pengar)
            if(!obj.passed && obj.y > window.innerHeight && (obj.type === 'enemy' || obj.type === 'police')) {
                obj.passed = true;
                game.money += 10;
            }

            // Ta bort gamla
            if(obj.y > window.innerHeight + 200) {
                obj.el.remove();
                game.objects.splice(i, 1);
            }
        });

        requestAnimationFrame(tick);
    }

    function triggerOil() {
        game.oilFrozen = true;
        document.getElementById('player').style.opacity = "0.5";
        setTimeout(() => {
            game.oilFrozen = false;
            document.getElementById('player').style.opacity = "1";
        }, 1000);
    }

    function crash() {
        game.running = false;
        storage.money += game.money;
        storage.totalDist += Math.floor(game.dist / 1000);
        save();
        
        document.getElementById('death-stats').innerText = `Du körde ${Math.floor(game.dist)} meter och tjänade ${game.money} kr.`;
        showMenu('death-menu');
    }

    function spawnLoop() {
        if(!game.running) return;
        
        const typeRoll = Math.random();
        let type = 'enemy';
        if(typeRoll < 0.15) type = 'oil';

        createObject(type);
        setTimeout(spawnLoop, Math.max(400, 2000 - (game.dist/10)));
    }

    function createObject(type) {
        const el = document.createElement('div');
        const lane = Math.random() > 0.5 ? 0 : 1;
        el.className = type;
        if(type === 'enemy') el.style.background = ENEMY_COLORS[Math.floor(Math.random()*10)];
        el.style.left = (lane === 0 ? 75 : 275) + 'px';
        el.style.top = '-150px';
        document.getElementById('game-area').appendChild(el);
        game.objects.push({ el, y: -150, type, passed: false });
    }

    function trafficLoop() {
        if(!game.running) return;
        setTimeout(() => {
            const tl = document.getElementById('traffic-light');
            tl.style.display = 'flex';
            
            // Grön
            document.getElementById('l-grn').classList.add('active-green');
            setTimeout(() => {
                document.getElementById('l-grn').classList.remove('active-green');
                document.getElementById('l-yel').classList.add('active-yellow');
                
                setTimeout(() => {
                    document.getElementById('l-yel').classList.remove('active-yellow');
                    document.getElementById('l-red').classList.add('active-red');
                    
                    // Polis attack!
                    for(let i=0; i<3; i++) {
                        setTimeout(() => createObject('police'), i * 600);
                    }

                    setTimeout(() => {
                        document.getElementById('l-red').classList.remove('active-red');
                        tl.style.display = 'none';
                        trafficLoop();
                    }, 5000);
                }, 2000);
            }, 3000);
        }, 30000);
    }

    // --- KONTROLLER ---
    window.addEventListener('keydown', e => {
        if(!game.running || game.oilFrozen) return;
        
        if(e.code === 'ArrowLeft' || e.code === 'KeyA') game.lane = 0;
        if(e.code === 'ArrowRight' || e.code === 'KeyD') game.lane = 1;
        
        if(e.code === 'Space') {
            if(game.nitroReady) {
                game.nitroActive = true;
                game.nitroReady = false;
                document.getElementById('nitro-txt').innerText = "BOOSTING!!!";
                document.getElementById('nitro-fill').style.background = "cyan";
                
                // Boost varar 4 sek
                setTimeout(() => {
                    game.nitroActive = false;
                    document.getElementById('nitro-txt').innerText = "LADDAR...";
                    document.getElementById('nitro-fill').style.background = "red";
                    document.getElementById('nitro-fill').style.width = "0%";
                    
                    // Laddning 10 sek
                    let progress = 0;
                    let iv = setInterval(() => {
                        progress += 1;
                        document.getElementById('nitro-fill').style.width = progress + "%";
                        if(progress >= 100) {
                            clearInterval(iv);
                            game.nitroReady = true;
                            document.getElementById('nitro-txt').innerText = "NITRO REDO [SPACE]";
                            document.getElementById('nitro-fill').style.background = "gold";
                        }
                    }, 100);
                }, 4000);
            }
        }
    });

    // Starta
    updateStats();
</script>
</body>
</html>
