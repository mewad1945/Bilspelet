<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Turbo Racer MAX</title>
    <style>
        :root {
            --neon-blue: #00f3ff;
            --neon-pink: #ff00ff;
        }

        body {
            margin: 0;
            padding: 0;
            background: #111;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #game-container {
            position: relative;
            width: 400px;
            height: 600px;
            background: #333;
            border: 4px solid #444;
            overflow: hidden;
        }

        /* FIX FÖR KNAPPARNA: Högt z-index och pointer-events */
        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 15, 15, 0.95);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 999; /* Garanterar att den ligger överst */
        }

        .active { display: flex; }

        canvas { display: block; z-index: 1; }

        .btn {
            background: #000;
            color: var(--neon-blue);
            border: 2px solid var(--neon-blue);
            padding: 12px 20px;
            margin: 10px;
            cursor: pointer;
            font-size: 16px;
            width: 220px;
            text-transform: uppercase;
            font-weight: bold;
            transition: 0.3s;
            pointer-events: auto; /* Gör knappen klickbar */
        }

        .btn:hover {
            background: var(--neon-blue);
            color: #000;
            box-shadow: 0 0 15px var(--neon-blue);
        }

        #hud {
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 100;
            pointer-events: none;
        }

        .stat-box {
            background: rgba(0,0,0,0.7);
            padding: 5px 10px;
            margin-bottom: 5px;
            border-left: 3px solid var(--neon-pink);
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            padding: 20px;
        }

        .item-card {
            border: 1px solid #444;
            padding: 10px;
            text-align: center;
            background: #222;
        }

        .locked { opacity: 0.5; filter: grayscale(1); }

        #traffic-light {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 30px;
            height: 80px;
            background: #000;
            border-radius: 5px;
            display: none;
            flex-direction: column;
            justify-content: space-around;
            align-items: center;
            padding: 5px 0;
            z-index: 110;
        }

        .light { width: 20px; height: 20px; border-radius: 50%; background: #222; }
        .red { background: #ff0000; box-shadow: 0 0 10px #ff0000; }
        .yellow { background: #ffcc00; box-shadow: 0 0 10px #ffcc00; }
        .green { background: #00ff00; box-shadow: 0 0 10px #00ff00; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="hud">
        <div class="stat-box">Pengar: <span id="money-display">0</span> kr</div>
        <div class="stat-box">KM: <span id="dist-display">0</span></div>
        <div class="stat-box" id="nitro-status">Nitro: REDO</div>
    </div>

    <div id="traffic-light">
        <div id="light-red" class="light"></div>
        <div id="light-yellow" class="light"></div>
        <div id="light-green" class="light"></div>
    </div>

    <div id="main-menu" class="screen active">
        <h1 style="color: var(--neon-blue)">TURBO RACER</h1>
        <button class="btn" onclick="startGame()">Starta Race</button>
        <button class="btn" onclick="openGarage()">Garage</button>
        <button class="btn" onclick="openTracks()">Byt Track</button>
    </div>

    <div id="garage-screen" class="screen">
        <h2>Garage</h2>
        <div class="grid" id="car-list"></div>
        <button class="btn" onclick="showScreen('main-menu')">Tillbaka</button>
    </div>

    <div id="track-screen" class="screen">
        <h2>Välj Bana</h2>
        <p>Total distans: <span id="total-dist-display">0</span> km</p>
        <div class="grid" id="track-list"></div>
        <button class="btn" onclick="showScreen('main-menu')">Tillbaka</button>
    </div>

    <div id="game-over" class="screen">
        <h1 style="color: red;">CRASH!</h1>
        <p id="final-stats"></p>
        <button class="btn" onclick="showScreen('main-menu')">Huvudmeny</button>
    </div>

    <canvas id="gameCanvas" width="400" height="600"></canvas>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // --- SYSTEM DATA ---
    const carModels = [
        { name: "Bas", color: "#33ff57", price: 0, speedMult: 1 },
        { name: "Sport", color: "#3357ff", price: 500, speedMult: 1.2 },
        { name: "Racer", color: "#f3ff33", price: 1500, speedMult: 1.5 },
        { name: "Super", color: "#ff33f3", price: 5000, speedMult: 2 },
        { name: "Hyper", color: "#00f3ff", price: 10000, speedMult: 2.5 }
    ];

    const trackModels = [
        { name: "Stad", color: "#333", req: 0, line: "#fff" },
        { name: "Öken", color: "#edc9af", req: 1, line: "#c2b280" },
        { name: "Skog", color: "#2d5a27", req: 5, line: "#1e391b" },
        { name: "Natt", color: "#000022", req: 10, line: "#3333ff" },
        { name: "Mars", color: "#8b0000", req: 25, line: "#ff4500" }
    ];

    const enemyColors = ["#ff0000", "#ff8800", "#ffffff", "#888888", "#440044"];

    // --- GAME STATE ---
    let state = {
        money: parseInt(localStorage.getItem('m')) || 0,
        totalDist: parseFloat(localStorage.getItem('td')) || 0,
        unlockedCars: JSON.parse(localStorage.getItem('uc')) || [0],
        currentCar: parseInt(localStorage.getItem('cc')) || 0,
        currentTrack: parseInt(localStorage.getItem('ct')) || 0
    };

    function save() {
        localStorage.setItem('m', state.money);
        localStorage.setItem('td', state.totalDist);
        localStorage.setItem('uc', JSON.stringify(state.unlockedCars));
        localStorage.setItem('cc', state.currentCar);
        localStorage.setItem('ct', state.currentTrack);
    }

    // --- UI LOGIC ---
    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        if(id !== 'none') document.getElementById(id).classList.add('active');
    }

    function openGarage() {
        showScreen('garage-screen');
        const list = document.getElementById('car-list');
        list.innerHTML = '';
        carModels.forEach((car, i) => {
            const owned = state.unlockedCars.includes(i);
            list.innerHTML += `
                <div class="item-card ${owned ? '' : 'locked'}">
                    <div style="background:${car.color}; width:20px; height:40px; margin:auto"></div>
                    <p>${car.name}</p>
                    <button class="btn" style="width:100px; font-size:12px" onclick="${owned ? `selectCar(${i})` : `buyCar(${i})`}">
                        ${owned ? (state.currentCar === i ? 'Vald' : 'Välj') : car.price+'kr'}
                    </button>
                </div>`;
        });
    }

    function buyCar(i) { if(state.money >= carModels[i].price) { state.money -= carModels[i].price; state.unlockedCars.push(i); save(); openGarage(); } }
    function selectCar(i) { state.currentCar = i; save(); openGarage(); }

    function openTracks() {
        showScreen('track-screen');
        document.getElementById('total-dist-display').innerText = (state.totalDist / 1000).toFixed(1);
        const list = document.getElementById('track-list');
        list.innerHTML = '';
        trackModels.forEach((t, i) => {
            const ok = (state.totalDist / 1000) >= t.req;
            list.innerHTML += `
                <div class="item-card ${ok ? '' : 'locked'}">
                    <p>${t.name}</p><small>${t.req}km krav</small><br>
                    <button class="btn" style="width:100px; font-size:12px" ${ok ? `onclick="selectTrack(${i})"` : 'disabled'}>
                        ${ok ? (state.currentTrack === i ? 'Vald' : 'Välj') : 'Låst'}
                    </button>
                </div>`;
        });
    }
    function selectTrack(i) { state.currentTrack = i; save(); openTracks(); }

    // --- GAME ENGINE ---
    let running = false, dist = 0, speed = 5, player = {x: 180, y: 500, w: 40, h: 70};
    let enemies = [], oilSpills = [], keys = {};
    let nitroReady = true, nitroActive = false, slipTimer = 0, trafficPhase = 'green';

    window.addEventListener('keydown', e => {
        keys[e.code] = true;
        if(e.code === 'Space' && nitroReady && running) activateNitro();
    });
    window.addEventListener('keyup', e => keys[e.code] = false);

    function activateNitro() {
        nitroActive = true; nitroReady = false; speed *= 2;
        document.getElementById('nitro-status').innerText = "🔥 NITRO!";
        setTimeout(() => { nitroActive = false; speed /= 2; document.getElementById('nitro-status').innerText = "Laddar..."; }, 4000);
        setTimeout(() => { nitroReady = true; if(running) document.getElementById('nitro-status').innerText = "Nitro: REDO"; }, 14000);
    }

    function startGame() {
        showScreen('none');
        running = true; dist = 0; speed = 5; enemies = []; oilSpills = []; player.x = 180;
        loop();
    }

    // Trafikljus-logik (Var 30-40 sek)
    setInterval(() => {
        if(!running) return;
        const tl = document.getElementById('traffic-light');
        tl.style.display = 'flex';
        setLight('yellow');
        setTimeout(() => {
            setLight('red'); trafficPhase = 'red';
            setTimeout(() => { 
                setLight('green'); trafficPhase = 'green';
                setTimeout(() => tl.style.display = 'none', 1000);
            }, 10000); // Rött i 10 sek (Polisbilar)
        }, 2000);
    }, 35000);

    function setLight(c) {
        document.getElementById('light-red').className = 'light' + (c=='red'?' red':'');
        document.getElementById('light-yellow').className = 'light' + (c=='yellow'?' yellow':'');
        document.getElementById('light-green').className = 'light' + (c=='green'?' green':'');
    }

    function loop() {
        if(!running) return;
        update();
        draw();
        requestAnimationFrame(loop);
    }

    function update() {
        // Öka fart varje 50 meter
        if(Math.floor(dist) % 50 === 0 && dist > 0) speed += 0.005;

        // Rörelse
        let pSpeed = 6 * carModels[state.currentCar].speedMult;
        if(slipTimer > 0) { pSpeed = -2; slipTimer--; }

        if(keys['ArrowLeft'] && player.x > 0) player.x -= pSpeed;
        if(keys['ArrowRight'] && player.x < canvas.width - player.w) player.x += pSpeed;

        // Spawn hinder
        if(Math.random() < (trafficPhase === 'red' ? 0.08 : 0.03)) {
            enemies.push({
                x: Math.random() * 360, y: -100, w: 40, h: 70, 
                color: trafficPhase === 'red' ? 'blue' : enemyColors[Math.floor(Math.random()*5)],
                passed: false
            });
        }
        if(Math.random() < 0.005) oilSpills.push({x: Math.random()*360, y: -100, w: 40, h: 40});

        // Uppdatera fiender
        enemies.forEach(en => {
            en.y += speed * (en.color === 'blue' ? 1.5 : 0.8);
            if(player.x < en.x+en.w && player.x+player.w > en.x && player.y < en.y+en.h && player.y+player.h > en.y) endGame();
            if(!en.passed && en.y > player.y) { state.money += 10; en.passed = true; }
        });

        // Uppdatera olja
        oilSpills.forEach(o => {
            o.y += speed;
            if(player.x < o.x+o.w && player.x+player.w > o.x && player.y < o.y+o.h && player.y+player.h > o.y) slipTimer = 60;
        });

        enemies = enemies.filter(e => e.y < 700);
        oilSpills = oilSpills.filter(o => o.y < 700);
        dist += speed / 10;

        document.getElementById('money-display').innerText = state.money;
        document.getElementById('dist-display').innerText = Math.floor(dist);
    }

    function draw() {
        const track = trackModels[state.currentTrack];
        ctx.fillStyle = track.color;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Väglinje
        ctx.strokeStyle = track.line; ctx.setLineDash([40,40]); ctx.lineWidth = 5;
        ctx.beginPath(); ctx.moveTo(200, 0); ctx.lineTo(200, 600); ctx.stroke();

        // Olja
        ctx.fillStyle = "rgba(0,0,0,0.8)";
        oilSpills.forEach(o => ctx.fillRect(o.x, o.y, o.w, o.h));

        // Fiender
        enemies.forEach(en => {
            ctx.fillStyle = en.color;
            ctx.fillRect(en.x, en.y, en.w, en.h);
            if(en.color === 'blue') { // Polis-blinkers
                ctx.fillStyle = Math.random() > 0.5 ? 'red' : 'blue';
                ctx.fillRect(en.x, en.y, 10, 10);
            }
        });

        // Spelare
        ctx.fillStyle = carModels[state.currentCar].color;
        if(nitroActive) { ctx.shadowBlur = 20; ctx.shadowColor = "cyan"; }
        ctx.fillRect(player.x, player.y, player.w, player.h);
        ctx.shadowBlur = 0;
    }

    function endGame() {
        running = false;
        state.totalDist += dist;
        save();
        document.getElementById('final-stats').innerText = `Du körde ${Math.floor(dist)}m och tjänade pengar!`;
        showScreen('game-over');
    }
</script>

</body>
</html>
