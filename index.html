<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <title>Retro Racer Pro</title>
    <style>
        body { margin: 0; background: #222; font-family: 'Courier New', Courier, monospace; overflow: hidden; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; }
        #game-container { position: relative; width: 400px; height: 600px; border: 4px solid #444; background: #333; }
        canvas { display: block; background: #555; }
        .ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.8); }
        .hidden { display: none; }
        h1 { margin-bottom: 20px; text-shadow: 2px 2px #ff0000; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; background: #ff4444; border: none; color: white; font-weight: bold; width: 200px; }
        button:hover { background: #ff6666; }
        button:disabled { background: #444; cursor: not-allowed; }
        .stats { position: absolute; top: 10px; left: 10px; pointer-events: none; z-index: 10; font-weight: bold; }
        .garage-item { border: 1px solid #777; padding: 10px; margin: 5px; width: 80%; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

<div id="game-container">
    <div class="stats" id="ingame-stats"></div>
    <canvas id="gameCanvas" width="400" height="600"></canvas>

    <div id="menu" class="ui-layer">
        <h1>RETRO RACER</h1>
        <p id="total-dist-display">Total distans: 0km</p>
        <p id="money-display">Pengar: 0kr</p>
        <button onclick="startGame()">STARTA RACE</button>
        <button onclick="showGarage()">GARAGE</button>
        <button onclick="showTracks()">BYT TRACK</button>
    </div>

    <div id="garage" class="ui-layer hidden">
        <h2>GARAGE</h2>
        <div id="garage-list" style="width: 100%;"></div>
        <button onclick="showMenu()">TILLBAKA</button>
    </div>

    <div id="track-select" class="ui-layer hidden">
        <h2>VÄLJ BANA</h2>
        <div id="track-list" style="width: 100%;"></div>
        <button onclick="showMenu()">TILLBAKA</button>
    </div>
</div>

<script>
/**
 * SPEL-LOGIK & KONFIGURATION
 */
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// --- TILLSTÅND (STATE) ---
let gameState = 'MENU';
let score = 0;
let money = parseInt(localStorage.getItem('money')) || 0;
let totalDist = parseFloat(localStorage.getItem('totalDist')) || 0;
let currentDist = 0;
let speed = 5;
let nitroAvailable = true;
let isNitroActive = false;
let nitroTimer = 0;
let nitroCooldown = 0;
let policeTimer = 0;
let trafficLight = 'GREEN'; // GREEN, YELLOW, RED
let lightTimer = 0;
let isSpinning = false;
let spinTimer = 0;

// --- BIL-DATA ---
let cars = [
    { id: 0, name: "Bas", color: "#f00", price: 0, owned: true, speedMult: 1 },
    { id: 1, name: "Snabbis", color: "#0f0", price: 500, owned: false, speedMult: 1.2 },
    { id: 2, name: "GTX", color: "#00f", price: 1500, owned: false, speedMult: 1.5 },
    { id: 3, name: "NitroKing", color: "#ff0", price: 3000, owned: false, speedMult: 1.8 },
    { id: 4, name: "Formula AI", color: "#f0f", price: 10000, owned: false, speedMult: 2.5 }
];
let activeCarIndex = parseInt(localStorage.getItem('activeCar')) || 0;

// --- TRACK-DATA ---
let tracks = [
    { id: 0, name: "Motorväg", minKm: 0, bgColor: "#555", line: "#fff" },
    { id: 1, name: "Öken", minKm: 1, bgColor: "#d2b48c", line: "#fff" },
    { id: 2, name: "Natt", minKm: 5, bgColor: "#111", line: "#444" },
    { id: 3, name: "Skog", minKm: 10, bgColor: "#2d5a27", line: "#fff" },
    { id: 4, name: "Vulkan", minKm: 25, bgColor: "#4a0e0e", line: "#ff4400" }
];
let activeTrackIndex = parseInt(localStorage.getItem('activeTrack')) || 0;

// --- OBJEKT ---
let player = { x: 175, y: 500, w: 40, h: 70 };
let enemies = [];
let oilPatches = [];
let roadLines = [];
let keys = {};

// Kontroller
window.addEventListener('keydown', e => keys[e.code] = true);
window.addEventListener('keyup', e => keys[e.code] = false);

// Initiera väglinjer
for(let i=0; i<10; i++) roadLines.push(i*80);

/**
 * CORE LOOP
 */
function update() {
    if (gameState !== 'RACING') return;

    // 1. Hantera Hastighet & Distans
    let currentSpeed = (speed + (Math.floor(currentDist / 50))) * cars[activeCarIndex].speedMult;
    if (isNitroActive) currentSpeed *= 2;
    if (isSpinning) currentSpeed *= 0.5;

    currentDist += 0.01;
    totalDist += 0.01;

    // 2. Rörelse Player
    if (!isSpinning) {
        if (keys['ArrowLeft'] && player.x > 50) player.x -= 5;
        if (keys['ArrowRight'] && player.x < 310) player.x += 5;
    } else {
        spinTimer--;
        player.x += Math.sin(spinTimer) * 5; // Sladdar lite
        if (spinTimer <= 0) isSpinning = false;
    }

    // 3. Nitro Logik
    if (keys['Space'] && nitroAvailable) {
        isNitroActive = true;
        nitroAvailable = false;
        nitroTimer = 240; // 4 sek @ 60fps
        nitroCooldown = 600; // 10 sek
    }
    if (nitroTimer > 0) {
        nitroTimer--;
        if (nitroTimer <= 0) isNitroActive = false;
    }
    if (nitroCooldown > 0) {
        nitroCooldown--;
        if (nitroCooldown <= 0) nitroAvailable = true;
    }

    // 4. Trafikljus & Polis-rush
    lightTimer++;
    if (lightTimer > 1800) { // Var 30:e sek
        if (lightTimer < 2000) trafficLight = 'YELLOW';
        else if (lightTimer < 2600) {
            trafficLight = 'RED';
            policeTimer = 1; // Triggar polis-logik
        } else {
            trafficLight = 'GREEN';
            lightTimer = 0;
            policeTimer = 0;
        }
    }

    // 5. Spawna fiender & Olja
    if (Math.random() < (trafficLight === 'RED' ? 0.06 : 0.02)) {
        let type = Math.floor(Math.random() * 5);
        enemies.push({ 
            x: Math.random() * 260 + 50, 
            y: -100, 
            w: 40, 
            h: 70, 
            speed: (Math.random() * 3 + 2), 
            color: trafficLight === 'RED' ? '#33f' : ['#ff8800','#88ff00','#00ffff','#ffffff','#ff00ff'][type]
        });
    }

    if (Math.random() < 0.005) {
        oilPatches.push({ x: Math.random() * 300 + 50, y: -50, w: 40, h: 40 });
    }

    // 6. Uppdatera positioner & Kollision
    enemies.forEach((enemy, index) => {
        enemy.y += currentSpeed - 2;
        if (enemy.y > 600) {
            enemies.splice(index, 1);
            score += 10;
            money += 10;
        }
        // Kollision Bil
        if (rectIntersect(player.x, player.y, player.w, player.h, enemy.x, enemy.y, enemy.w, enemy.h)) {
            gameOver();
        }
    });

    oilPatches.forEach((oil, index) => {
        oil.y += currentSpeed;
        if (rectIntersect(player.x, player.y, player.w, player.h, oil.x, oil.y, oil.w, oil.h)) {
            isSpinning = true;
            spinTimer = 60; // 1 sek
            oilPatches.splice(index, 1);
        }
    });

    // Flytta väglinjer
    roadLines = roadLines.map(y => (y + currentSpeed) % 600);

    draw();
    requestAnimationFrame(update);
}

/**
 * RENDERING
 */
function draw() {
    let track = tracks[activeTrackIndex];
    ctx.fillStyle = track.bgColor;
    ctx.fillRect(0, 0, 400, 600);

    // Väglinjer
    ctx.strokeStyle = track.line;
    ctx.setLineDash([20, 20]);
    ctx.lineWidth = 5;
    ctx.beginPath();
    ctx.moveTo(200, 0);
    ctx.lineTo(200, 600);
    ctx.stroke();

    // Sidolinjer
    ctx.setLineDash([]);
    ctx.strokeRect(50, -10, 300, 620);

    // Olja
    ctx.fillStyle = "black";
    oilPatches.forEach(o => ctx.fillRect(o.x, o.y, o.w, o.h));

    // Fiender
    enemies.forEach(e => {
        ctx.fillStyle = e.color;
        ctx.fillRect(e.x, e.y, e.w, e.h);
        // Blåljus om polis
        if (trafficLight === 'RED') {
            ctx.fillStyle = (Date.now() % 200 < 100) ? 'red' : 'blue';
            ctx.fillRect(e.x, e.y, 10, 10);
        }
    });

    // Spelare
    ctx.save();
    if (isSpinning) {
        ctx.translate(player.x + 20, player.y + 35);
        ctx.rotate(spinTimer * 0.2);
        ctx.translate(-(player.x + 20), -(player.y + 35));
    }
    ctx.fillStyle = cars[activeCarIndex].color;
    ctx.fillRect(player.x, player.y, player.w, player.h);
    // Nitro flamma
    if (isNitroActive) {
        ctx.fillStyle = "orange";
        ctx.fillRect(player.x + 5, player.y + 70, 30, 20);
    }
    ctx.restore();

    // UI Overlay
    document.getElementById('ingame-stats').innerHTML = `
        KM: ${currentDist.toFixed(1)} | ${money}kr<br>
        NITRO: ${nitroAvailable ? 'REDO' : (nitroTimer > 0 ? 'AKTIV' : 'LADDAR...')}<br>
        LJUS: <span style="color:${trafficLight}">${trafficLight}</span>
    `;
}

/**
 * SYSTEMFUNKTIONER
 */
function rectIntersect(x1, y1, w1, h1, x2, y2, w2, h2) {
    return x2 < x1 + w1 && x2 + w2 > x1 && y2 < y1 + h1 && y2 + h2 > y1;
}

function startGame() {
    document.getElementById('menu').classList.add('hidden');
    gameState = 'RACING';
    currentDist = 0;
    enemies = [];
    oilPatches = [];
    player.x = 175;
    speed = 5;
    update();
}

function gameOver() {
    gameState = 'MENU';
    localStorage.setItem('money', money);
    localStorage.setItem('totalDist', totalDist.toFixed(2));
    saveOwnedCars();
    
    document.getElementById('menu').classList.remove('hidden');
    updateMenuStats();
    alert("CRASH! Du tjänade: " + Math.floor(currentDist * 10) + "kr på distans.");
}

function updateMenuStats() {
    document.getElementById('total-dist-display').innerText = `Total distans: ${parseFloat(totalDist).toFixed(1)}km`;
    document.getElementById('money-display').innerText = `Pengar: ${money}kr`;
}

// --- GARAGE & TRACK LOGIK ---
function showGarage() {
    document.getElementById('menu').classList.add('hidden');
    document.getElementById('garage').classList.remove('hidden');
    const list = document.getElementById('garage-list');
    list.innerHTML = "";
    
    cars.forEach((car, index) => {
        const item = document.createElement('div');
        item.className = 'garage-item';
        item.innerHTML = `
            <span>${car.name} (${car.color})</span>
            <button onclick="buyCar(${index})" ${car.owned ? 'disabled' : ''}>
                ${car.owned ? 'ÄGD' : car.price + 'kr'}
            </button>
            ${car.owned ? `<button onclick="selectCar(${index})">${activeCarIndex == index ? 'VALD' : 'VÄLJ'}</button>` : ''}
        `;
        list.appendChild(item);
    });
}

function buyCar(i) {
    if (money >= cars[i].price) {
        money -= cars[i].price;
        cars[i].owned = true;
        saveOwnedCars();
        showGarage();
    }
}

function selectCar(i) {
    activeCarIndex = i;
    localStorage.setItem('activeCar', i);
    showGarage();
}

function showTracks() {
    document.getElementById('menu').classList.add('hidden');
    document.getElementById('track-select').classList.remove('hidden');
    const list = document.getElementById('track-list');
    list.innerHTML = "";
    
    tracks.forEach((t, index) => {
        const locked = totalDist < t.minKm;
        const item = document.createElement('div');
        item.className = 'garage-item';
        item.innerHTML = `
            <span>${t.name} ${locked ? '(Låst: '+t.minKm+'km)' : ''}</span>
            <button onclick="selectTrack(${index})" ${locked ? 'disabled' : ''}>
                ${activeTrackIndex == index ? 'VALD' : 'VÄLJ'}
            </button>
        `;
        list.appendChild(item);
    });
}

function selectTrack(i) {
    activeTrackIndex = i;
    localStorage.setItem('activeTrack', i);
    showTracks();
}

function showMenu() {
    document.querySelectorAll('.ui-layer').forEach(l => l.classList.add('hidden'));
    document.getElementById('menu').classList.remove('hidden');
    updateMenuStats();
}

function saveOwnedCars() {
    const owned = cars.map(c => c.owned);
    localStorage.setItem('ownedCars', JSON.stringify(owned));
}

// Ladda sparade bilar
const savedOwned = JSON.parse(localStorage.getItem('ownedCars'));
if (savedOwned) {
    savedOwned.forEach((owned, i) => cars[i].owned = owned);
}

updateMenuStats();
</script>
</body>
</html>
